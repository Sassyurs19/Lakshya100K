<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshya ₹100K - Small Savings. Big Dreams.</title>
    <meta name="description" content="Track every rupee, build lasting habits, and reach your ₹1,00,000 goal with confidence.">
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <p style="color: var(--text-secondary); font-weight: 600;">Loading...</p>
        </div>
    </div>

    <!-- Premium Minimalist Background -->
    <div class="premium-background"></div>

    <!-- Sticky Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <span>Lakshya</span><span class="brand-blue">₹100K</span>
            </a>
            <div class="nav-right">
                <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
                <a href="signup.html" class="btn btn-primary btn-sm">Create Account</a>
            </div>
        </div>
    </nav>

    <!-- Spacious Hero Section -->
    <div class="hero-section" id="heroSection" style="display: none;">
        <div class="hero-container">
            <div class="hero-content">
                <h1 class="hero-title">Save Today.<br>Achieve Tomorrow.</h1>
                <p class="hero-subtitle">Track every rupee, build lasting habits, and reach your ₹1,00,000 savings goal with confidence.</p>
                <div class="hero-buttons">
                    <a href="signup.html" class="btn btn-primary btn-lg">
                        Create Account
                    </a>
                    <a href="login.html" class="btn btn-secondary btn-lg">
                        Login
                    </a>
                </div>
            </div>
            <div class="hero-graphic">
                <div class="hero-illustration">
                    <svg viewBox="0 0 500 400" width="100%" height="100%" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Background decorative grid/circles -->
                        <circle cx="250" cy="200" r="180" stroke="var(--border-color)" stroke-width="1.5"/>
                        <circle cx="250" cy="200" r="120" stroke="var(--border-color)" stroke-width="1.5" stroke-dasharray="6 6"/>
                        <line x1="70" y1="200" x2="430" y2="200" stroke="var(--border-color)" stroke-width="1"/>
                        <line x1="250" y1="20" x2="250" y2="380" stroke="var(--border-color)" stroke-width="1"/>
                        
                        <!-- Main target/goal concentric elements -->
                        <rect x="175" y="125" width="150" height="150" rx="18" fill="var(--bg-card)" stroke="var(--border-color)" stroke-width="2" class="hero-svg-card"/>
                        <circle cx="250" cy="200" r="36" fill="var(--primary-light)"/>
                        <circle cx="250" cy="200" r="20" fill="var(--primary)" opacity="0.15"/>
                        <circle cx="250" cy="200" r="8" fill="var(--primary)"/>
                        
                        <!-- Data floating cards/nodes -->
                        <g class="hero-svg-node" transform="translate(60, 60)">
                            <rect width="150" height="60" rx="12" fill="var(--bg-card)" stroke="var(--border-color)" stroke-width="1.5"/>
                            <text x="16" y="24" fill="var(--text-primary)" font-family="inherit" font-size="12" font-weight="700">Goal Progress</text>
                            <rect x="16" y="36" width="118" height="6" rx="3" fill="var(--secondary)"/>
                            <rect x="16" y="36" width="85" height="6" rx="3" fill="var(--success)"/>
                        </g>
                        
                        <g class="hero-svg-node" transform="translate(310, 290)">
                            <rect width="130" height="46" rx="23" fill="var(--bg-card)" stroke="var(--border-color)" stroke-width="1.5"/>
                            <circle cx="23" cy="23" r="11" fill="var(--primary-light)"/>
                            <path d="M19 23L22 26L27 20" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <text x="42" y="27" fill="var(--text-primary)" font-family="inherit" font-size="11" font-weight="700">Goal: ₹100,000</text>
                        </g>

                        <!-- Dynamic trend line -->
                        <path d="M120 300C160 260 200 320 250 250C300 180 330 220 380 140" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" class="hero-svg-line"/>
                        
                        <!-- Interactive dots -->
                        <circle cx="120" cy="300" r="4" fill="var(--primary)"/>
                        <circle cx="250" cy="250" r="4" fill="var(--primary)"/>
                        <circle cx="380" cy="140" r="6" fill="var(--primary)" stroke="var(--bg-card)" stroke-width="2"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { onAuthStateChange } from './js/auth.js';
        
        const loadingScreen = document.getElementById('loadingScreen');
        const heroSection = document.getElementById('heroSection');

        // Timeout fallback
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <p style="color: var(--danger); font-weight: 700; margin-bottom: 1rem;">Unable to connect. Please check your internet connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (user) {
                // User is authenticated, redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // User is not authenticated, show landing page
                heroSection.style.display = 'flex';
            }
        });
    </script>

    <style>
        .hero-section {
            min-height: calc(100vh - var(--navbar-height));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        .hero-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 4rem;
            max-width: 1200px;
            width: 100%;
            align-items: center;
        }

        .hero-content {
            text-align: left;
        }

        .hero-title {
            font-size: 3.75rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            letter-spacing: -0.03em;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 520px;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-start;
        }

        .hero-graphic {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 991px) {
            .hero-container {
                grid-template-columns: 1fr;
                gap: 3rem;
                text-align: center;
            }
            .hero-content {
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .hero-title {
                font-size: 2.75rem;
            }
            .hero-buttons {
                justify-content: center;
            }
        }
    </style>
</body>
</html>
