<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Saving - Lakshya ₹100K</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Premium Background -->
    <div class="premium-background"></div>
    
    <!-- Animated Money Background -->
    <div class="money-background">
        <div class="money-symbol symbol-1">₹</div>
        <div class="money-symbol symbol-2">₹</div>
        <div class="money-symbol symbol-3">₹</div>
        <div class="money-symbol symbol-4">₹</div>
        <div class="money-symbol symbol-5">₹</div>
        <div class="money-symbol symbol-6">₹</div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <p style="color: var(--text-secondary); font-weight: 600;">Loading...</p>
        </div>
    </div>

    <!-- Sticky Top Navigation Bar -->
    <nav class="top-nav" id="navbar" style="display: none;">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-brand">
                <svg class="brand-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 22H22L12 2Z" fill="url(#brandGrad)"/><circle cx="12" cy="14" r="3" fill="#ffffff"/><defs><linearGradient id="brandGrad" x1="2" y1="22" x2="22" y2="2" gradientUnits="userSpaceOnUse"><stop stop-color="#2563EB"/><stop offset="1" stop-color="#10B981"/></linearGradient></defs></svg>
                <span>Lakshya</span><span class="brand-blue">₹100K</span>
            </a>
            
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Home</a>
                <a href="add-saving.html" class="nav-link active">Add Saving</a>
                <a href="history.html" class="nav-link">History</a>
                <a href="analytics.html" class="nav-link">Analytics</a>
                <a href="gallery.html" class="nav-link">Gallery</a>
                <a href="achievements.html" class="nav-link">Achievements</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            
            <div class="nav-right">
                <button class="nav-icon-btn" id="themeToggle" title="Toggle Theme">
                    <i data-lucide="moon"></i>
                </button>
                <div class="profile-dropdown" id="profileDropdown">
                    <button class="avatar-btn" id="avatarDropdownToggle">
                        <div class="avatar-circle" id="userAvatar">U</div>
                    </button>
                    <div class="dropdown-menu">
                        <div style="padding: 12px 16px; font-size: 0.8rem; color: var(--text-secondary); font-weight: 600;" id="usernameDisplay">@username</div>
                        <div class="dropdown-divider"></div>
                        <a href="profile.html" class="dropdown-item">
                            <i data-lucide="user"></i> Profile
                        </a>
                        <a href="settings.html" class="dropdown-item">
                            <i data-lucide="settings"></i> Settings
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item logout" id="logoutBtn">
                            <i data-lucide="log-out"></i> Logout
                        </a>
                    </div>
                </div>
                <button class="hamburger" id="mobileMenuBtn">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Mobile Navigation Drawer -->
    <div class="mobile-drawer" id="mobileDrawer">
        <div class="drawer-header">
            <a href="dashboard.html" class="nav-brand">
                <svg class="brand-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 22H22L12 2Z" fill="url(#brandGrad)"/><circle cx="12" cy="14" r="3" fill="#ffffff"/><defs><linearGradient id="brandGrad" x1="2" y1="22" x2="22" y2="2" gradientUnits="userSpaceOnUse"><stop stop-color="#2563EB"/><stop offset="1" stop-color="#10B981"/></linearGradient></defs></svg>
                <span>Lakshya</span><span class="brand-blue">₹100K</span>
            </a>
            <button class="close-btn" id="closeDrawerBtn">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="drawer-links">
            <a href="dashboard.html" class="drawer-link">Home</a>
            <a href="add-saving.html" class="drawer-link active">Add Saving</a>
            <a href="history.html" class="drawer-link">History</a>
            <a href="analytics.html" class="drawer-link">Analytics</a>
            <a href="gallery.html" class="drawer-link">Gallery</a>
            <a href="achievements.html" class="drawer-link">Achievements</a>
            <a href="settings.html" class="drawer-link">Settings</a>
            <div class="drawer-divider"></div>
            <a href="profile.html" class="drawer-link"><i data-lucide="user" style="display:inline; vertical-align:middle; margin-right:8px;"></i>Profile</a>
            <a href="settings.html" class="drawer-link"><i data-lucide="settings" style="display:inline; vertical-align:middle; margin-right:8px;"></i>Settings</a>
            <a href="#" class="drawer-link logout" id="drawerLogoutBtn"><i data-lucide="log-out" style="display:inline; vertical-align:middle; margin-right:8px;"></i>Logout</a>
        </div>
    </div>
    <div class="drawer-overlay" id="drawerOverlay"></div>

    <div class="page-container">
        <!-- Main Content -->
        <main class="main-content" id="main-content" style="display: none;">
            <div class="minimal-form-card">
                <div class="form-header">
                    <a href="dashboard.html" class="back-link">
                        <i data-lucide="arrow-left" style="width:18px; height:18px;"></i>
                    </a>
                    <h2 class="form-title">Add New Saving</h2>
                </div>
                
                <form id="addSavingForm" class="minimal-form">
                    <div class="form-row">
                        <div class="form-field">
                            <label class="field-label">Amount (₹)</label>
                            <input type="number" class="field-input" name="amount" required placeholder="0" min="1" max="100000000">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-field">
                            <label class="field-label">Date</label>
                            <input type="date" class="field-input" name="date" id="dateInput" required>
                        </div>
                        
                        <div class="form-field">
                            <label class="field-label">Time</label>
                            <input type="time" class="field-input" name="time" id="timeInput" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-field">
                            <label class="field-label">Category</label>
                            <select class="field-input" name="category" required>
                                <option value="Cash">Cash</option>
                                <option value="UPI">UPI</option>
                                <option value="Bank">Bank</option>
                                <option value="Wallet">Wallet</option>
                                <option value="Investment">Investment</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-field">
                            <label class="field-label">Note</label>
                            <textarea class="field-input field-textarea" name="note" placeholder="Add a note..." maxlength="500"></textarea>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" onclick="resetForm()" class="btn btn-secondary btn-sm">Reset</button>
                        <button type="submit" class="btn btn-primary btn-sm">Save Saving</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { onAuthStateChange, logoutUser, getCurrentUser } from './js/auth.js';
        import { addSaving, getUserDocument } from './js/database.js';
        import { uploadSavingImage } from './js/storage.js';
        import { showToast } from './js/utils.js';

        const loadingScreen = document.getElementById('loadingScreen');
        const navbar = document.getElementById('navbar');
        const mainContent = document.getElementById('main-content');

        // Timeout fallback
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <p style="color: var(--danger); font-weight: 700; margin-bottom: 1rem;">Unable to connect. Please check your connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (!user) {
                window.location.href = 'login.html';
            } else {
                navbar.style.display = 'block';
                mainContent.style.display = 'block';
                loadUserInfo(user);
                // Set default date and time
                const now = new Date();
                document.getElementById('dateInput').value = now.toISOString().split('T')[0];
                document.getElementById('timeInput').value = now.toTimeString().slice(0, 5);
                lucide.createIcons();
            }
        });

        async function loadUserInfo(user) {
            const userDoc = await getUserDocument(user.uid);
            if (userDoc.success) {
                const userData = userDoc.data;
                const username = userData.username || 'user';
                const usernameDisplay = document.getElementById('usernameDisplay');
                const userAvatar = document.getElementById('userAvatar');
                
                if (usernameDisplay) usernameDisplay.textContent = `@${username}`;
                if (userAvatar) {
                    const userInitial = (userData.fullName || userData.username || 'U').charAt(0).toUpperCase();
                    userAvatar.textContent = userInitial;
                }
            }
        }

        // Preview image
        window.previewImage = function(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                if (file.size > 5 * 1024 * 1024) {
                    showToast('Image size must be less than 5 MB', 'error');
                    input.value = '';
                    return;
                }
                
                const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp'];
                if (!allowedTypes.includes(file.type)) {
                    showToast('Only JPG, PNG, and WebP images are allowed', 'error');
                    input.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    lucide.createIcons();
                }
                reader.readAsDataURL(file);
            }
        };

        // Remove image
        window.removeImage = function() {
            document.getElementById('imageInput').value = '';
            document.getElementById('previewImg').src = '';
            document.getElementById('imagePreview').style.display = 'none';
        };

        // Reset form
        window.resetForm = function() {
            document.getElementById('addSavingForm').reset();
            window.removeImage();
            
            const now = new Date();
            document.getElementById('dateInput').value = now.toISOString().split('T')[0];
            document.getElementById('timeInput').value = now.toTimeString().slice(0, 5);
        };

        // Handle form submission
        document.getElementById('addSavingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = getCurrentUser();
            console.log('[addSavingForm] Current user:', user ? user.uid : 'null');
            if (!user) {
                showToast('Please login first', 'error');
                return;
            }
            
            const amount = parseInt(e.target.amount.value);
            const date = e.target.date.value;
            const time = e.target.time.value;
            const category = e.target.category.value;
            const note = e.target.note.value.trim();
            const imageFile = e.target.image.files[0];
            
            if (isNaN(amount) || amount <= 0) {
                showToast('Please enter a valid amount greater than zero', 'error');
                return;
            }
            
            if (amount > 10000000) {
                showToast('Amount cannot exceed ₹10,000,000', 'error');
                return;
            }
            
            if (!date) {
                showToast('Please select a date', 'error');
                return;
            }
            
            if (!time) {
                showToast('Please select a time', 'error');
                return;
            }
            
            if (!category) {
                showToast('Please select a category', 'error');
                return;
            }
            
            if (note && note.length > 500) {
                showToast('Note must be less than 500 characters', 'error');
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            if (submitBtn.disabled) return;
            
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            let imageURL = null;
            let imagePath = null;
            
            if (imageFile) {
                const savingId = Date.now().toString();
                const uploadResult = await uploadSavingImage(imageFile, user.uid, savingId);
                if (uploadResult.success) {
                    imageURL = uploadResult.url;
                    imagePath = uploadResult.ref.fullPath;
                } else {
                    showToast(uploadResult.error, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
            }
            
            const savingData = {
                userId: user.uid,
                amount,
                date,
                time,
                category,
                note,
                imageURL,
                imagePath
            };
            
            console.log('[addSavingForm] Saving data being sent:', savingData);
            const result = await addSaving(savingData);
            console.log('[addSavingForm] Add saving result:', result);
            
            if (result.success) {
                showToast('Saving added successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showToast(result.error, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Nav Dropdown and Drawer functionality
        const avatarBtn = document.getElementById('avatarDropdownToggle');
        const profileDropdown = document.getElementById('profileDropdown');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileDrawer = document.getElementById('mobileDrawer');
        const drawerOverlay = document.getElementById('drawerOverlay');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');

        if (avatarBtn && profileDropdown) {
            avatarBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                profileDropdown.classList.toggle('open');
            });
            document.addEventListener('click', () => {
                profileDropdown.classList.remove('open');
            });
        }

        if (mobileMenuBtn && mobileDrawer && drawerOverlay) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileDrawer.classList.add('open');
                drawerOverlay.classList.add('open');
            });
            
            const closeDrawer = () => {
                mobileDrawer.classList.remove('open');
                drawerOverlay.classList.remove('open');
            };
            
            drawerOverlay.addEventListener('click', closeDrawer);
            if (closeDrawerBtn) closeDrawerBtn.addEventListener('click', closeDrawer);
        }

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });
        
        document.getElementById('drawerLogoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.innerHTML = '<i data-lucide="sun"></i>';
        }
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            if (newTheme === 'dark') {
                themeToggle.innerHTML = '<i data-lucide="sun"></i>';
            } else {
                themeToggle.innerHTML = '<i data-lucide="moon"></i>';
            }
            lucide.createIcons();
        });
    </script>

    <style>
        .main-content {
            padding: 24px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Minimal Form Card */
        .minimal-form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .back-link {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(37, 99, 235, 0.1);
            color: #2563EB;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            background: rgba(37, 99, 235, 0.2);
            transform: translateX(-2px);
        }

        .form-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        /* Minimal Form */
        .minimal-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row > .form-field:first-child:last-child {
            grid-column: 1 / -1;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .field-input {
            padding: 12px 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            background: white;
            transition: all 0.2s ease;
            outline: none;
        }

        .field-input:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .field-input::placeholder {
            color: var(--text-tertiary);
        }

        .field-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .form-actions .btn {
            flex: 1;
            height: 44px;
            font-weight: 600;
        }

        /* Animated Money Background */
        .money-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .money-symbol {
            position: absolute;
            font-size: 120px;
            font-weight: 800;
            color: rgba(37, 99, 235, 0.05);
            animation: floatMoney 30s infinite ease-in-out;
            user-select: none;
        }

        .symbol-1 {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .symbol-2 {
            top: 30%;
            right: 10%;
            animation-delay: -5s;
        }

        .symbol-3 {
            bottom: 20%;
            left: 15%;
            animation-delay: -10s;
        }

        .symbol-4 {
            top: 50%;
            left: 50%;
            animation-delay: -15s;
        }

        .symbol-5 {
            bottom: 40%;
            right: 20%;
            animation-delay: -20s;
        }

        .symbol-6 {
            top: 70%;
            left: 30%;
            animation-delay: -25s;
        }

        @keyframes floatMoney {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.05;
            }
            25% {
                transform: translate(30px, -30px) rotate(10deg);
                opacity: 0.08;
            }
            50% {
                transform: translate(0, -60px) rotate(0deg);
                opacity: 0.05;
            }
            75% {
                transform: translate(-30px, -30px) rotate(-10deg);
                opacity: 0.08;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .main-content {
                padding: 16px;
            }

            .minimal-form-card {
                padding: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-title {
                font-size: 20px;
            }

            .money-symbol {
                font-size: 80px;
            }
        }

        /* Dark Theme Support */
        [data-theme="dark"] .minimal-form-card {
            background: rgba(30, 30, 30, 0.9);
            border-color: rgba(255, 255, 255, 0.1);
        }

        [data-theme="dark"] .field-input {
            background: rgba(40, 40, 40, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        [data-theme="dark"] .money-symbol {
            color: rgba(37, 99, 235, 0.1);
        }
    </style>
</body>
</html>
