<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 404 Content -->
    <div class="error-container">
        <div class="card" style="text-align: center; padding: 4rem;">
            <div style="font-size: 8rem; margin-bottom: 1rem;">404</div>
            <h2 style="margin-bottom: 1rem;">Page Not Found</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Oops! The page you're looking for doesn't exist.</p>
            <a href="index.html" class="btn btn-primary">
                Go Home
            </a>
        </div>
    </div>

    <style>
        .error-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
    </style>
</body>
</html>
