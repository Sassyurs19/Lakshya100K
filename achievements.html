<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Premium Animated Background -->
    <div class="premium-background">
        <div class="gradient-blob gradient-blob-1"></div>
        <div class="gradient-blob gradient-blob-2"></div>
        <div class="gradient-blob gradient-blob-3"></div>
        <div class="grid-pattern"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="mouse-glow" id="mouseGlow"></div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </div>

    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <nav class="navbar" id="navbar" style="display: none;">
        <a href="dashboard.html" class="navbar-brand">
            <span class="brand-name">Lakshya</span>
            <span class="brand-amount">₹100K</span>
        </a>
        <div class="navbar-center">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="add-saving.html" class="nav-link">Add Saving</a>
            <a href="history.html" class="nav-link">History</a>
            <a href="analytics.html" class="nav-link">Analytics</a>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <a href="achievements.html" class="nav-link active">Achievements</a>
            <a href="settings.html" class="nav-link">Settings</a>
        </div>
        <div class="navbar-right">
            <div class="dropdown" id="menuDropdown">
                <div class="dropdown-toggle" id="menuToggle">
                    <div class="avatar" id="userAvatar">U</div>
                    <span class="username-display" id="usernameDisplay">@username</span>
                </div>
                <div class="dropdown-menu">
                    <a href="profile.html" class="dropdown-item">
                        <i class="fas fa-user"></i>
                        Profile
                    </a>
                    <a href="settings.html" class="dropdown-item">
                        <i class="fas fa-cog"></i>
                        Settings
                    </a>
                    <div style="border-top: 1px solid var(--border-color); margin: var(--spacing-sm) 0;"></div>
                    <a href="#" class="dropdown-item logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </a>
                </div>
            </div>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content" style="display: none;">
        <h1 style="margin-bottom: 2rem; font-family: 'Playfair Display', serif;">Achievements</h1>
        
        <!-- Summary Card -->
        <div class="card achievement-summary" style="margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h3 style="margin-bottom: 0.5rem; font-family: 'Playfair Display', serif;">Your Progress</h3>
                    <p style="margin: 0; color: var(--text-secondary);">
                        <span class="highlight-number" id="unlockedCount">0</span> / <span id="totalCount">10</span> Achievements Unlocked
                    </p>
                </div>
                <div class="progress-ring-container">
                    <svg class="progress-ring" width="100" height="100">
                        <circle class="progress-ring-circle-bg" stroke="var(--bg-tertiary)" stroke-width="8" fill="transparent" r="42" cx="50" cy="50"/>
                        <circle class="progress-ring-circle" id="progressCircle" stroke="var(--primary)" stroke-width="8" fill="transparent" r="42" cx="50" cy="50"/>
                    </svg>
                    <div class="progress-percentage" id="progressPercentage">0%</div>
                </div>
            </div>
        </div>

        <!-- Milestones Section -->
        <div class="card" style="margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1.5rem; font-family: 'Playfair Display', serif;">Milestones</h3>
            <div class="milestones-container" id="milestonesContainer">
                <!-- Milestones will be loaded here -->
            </div>
        </div>

        <!-- Achievements Grid -->
        <h3 style="margin-bottom: 1.5rem; font-family: 'Playfair Display', serif;">Badges</h3>
        <div class="achievements-grid" id="achievementsGrid">
            <!-- Achievements will be loaded here -->
        </div>
    </main>

    <style>
        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .achievement-summary {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
        }

        .highlight-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-ring-container {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-circle-bg {
            stroke: var(--bg-tertiary);
        }

        .progress-ring-circle {
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .milestones-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .milestone-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            transition: all 0.3s ease;
        }

        .milestone-item.completed {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
            border: 1px solid var(--success);
        }

        .milestone-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            background: var(--bg-primary);
            color: var(--text-tertiary);
            transition: all 0.3s ease;
        }

        .milestone-item.completed .milestone-icon {
            background: var(--success);
            color: white;
        }

        .milestone-info {
            flex: 1;
        }

        .milestone-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .milestone-description {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .milestone-status {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
        }

        .milestone-item.completed .milestone-status {
            background: var(--success);
            color: white;
        }

        .milestone-item:not(.completed) .milestone-status {
            background: var(--bg-primary);
            color: var(--text-tertiary);
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .achievement-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .achievement-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--bg-tertiary);
            transition: background 0.3s ease;
        }

        .achievement-card.unlocked::before {
            background: var(--gradient-primary);
        }

        .achievement-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .achievement-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            transition: all 0.3s ease;
        }

        .achievement-card.unlocked .achievement-icon {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--glow-primary);
        }

        .achievement-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-family: 'Playfair Display', serif;
        }

        .achievement-description {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .achievement-amount {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .achievement-card.locked {
            opacity: 0.6;
        }

        .achievement-card.locked .achievement-icon {
            background: var(--bg-tertiary);
        }

        .achievement-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
        }

        .achievement-card.unlocked .achievement-badge {
            background: var(--success);
            color: white;
        }

        .achievement-card.locked .achievement-badge {
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
            
            .achievements-grid {
                grid-template-columns: 1fr;
            }

            .achievement-summary {
                flex-direction: column;
                text-align: center;
            }

            .progress-ring-container {
                margin: 0 auto;
            }
        }
    </style>

    <script type="module">
        import { onAuthStateChange, logoutUser, getCurrentUser } from './js/auth.js';
        import { calculateStatistics, getUserAchievements } from './js/database.js';
        import { showToast } from './js/utils.js';

        const loadingScreen = document.getElementById('loadingScreen');
        const navbar = document.getElementById('navbar');
        const mainContent = document.getElementById('main-content');

        const achievements = [
            { id: 'first_saving', name: 'First Saving', icon: 'fa-crosshairs', threshold: 1, description: 'Add your first saving' },
            { id: 'hundred', name: '₹100', icon: 'fa-coins', threshold: 100, description: 'Save ₹100' },
            { id: 'five_hundred', name: '₹500', icon: 'fa-money-bill', threshold: 500, description: 'Save ₹500' },
            { id: 'thousand', name: '₹1,000', icon: 'fa-gem', threshold: 1000, description: 'Save ₹1,000' },
            { id: 'five_thousand', name: '₹5,000', icon: 'fa-trophy', threshold: 5000, description: 'Save ₹5,000' },
            { id: 'ten_thousand', name: '₹10,000', icon: 'fa-star', threshold: 10000, description: 'Save ₹10,000' },
            { id: 'twenty_five_thousand', name: '₹25,000', icon: 'fa-award', threshold: 25000, description: 'Save ₹25,000' },
            { id: 'fifty_thousand', name: '₹50,000', icon: 'fa-crown', threshold: 50000, description: 'Save ₹50,000' },
            { id: 'seventy_five_thousand', name: '₹75,000', icon: 'fa-fire', threshold: 75000, description: 'Save ₹75,000' },
            { id: 'one_hundred_thousand', name: '₹100,000', icon: 'fa-flag-checkered', threshold: 100000, description: 'Reach your goal!' }
        ];

        // Timeout fallback - if auth doesn't resolve in 5 seconds, show error
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout - Firebase may not be initialized');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: var(--danger); margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Unable to connect. Please check your internet connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (!user) {
                window.location.href = 'login.html';
            } else {
                navbar.style.display = 'block';
                mainContent.style.display = 'block';
                loadUserInfo(user);
                loadAchievements(user);
            }
        });

        async function loadUserInfo(user) {
            const userDoc = await getUserDocument(user.uid);
            if (userDoc.success) {
                const userData = userDoc.data;
                const username = userData.username || 'user';
                const usernameDisplay = document.getElementById('usernameDisplay');
                const userAvatar = document.getElementById('userAvatar');
                
                if (usernameDisplay) usernameDisplay.textContent = `@${username}`;
                if (userAvatar) {
                    const userInitial = (userData.fullName || userData.username || 'U').charAt(0).toUpperCase();
                    userAvatar.textContent = userInitial;
                }
            }
        }

        // Load achievements
        async function loadAchievements(user) {
            const stats = await calculateStatistics(user.uid);
            const userAchievements = await getUserAchievements(user.uid);
            
            const unlockedAchievementIds = userAchievements.success 
                ? userAchievements.data.map(a => a.name)
                : [];
            
            const totalSaved = stats.success ? stats.data.totalSaved : 0;
            
            // Update summary
            const unlockedCount = unlockedAchievementIds.length;
            const totalCount = achievements.length;
            const percentage = Math.round((unlockedCount / totalCount) * 100);
            
            document.getElementById('unlockedCount').textContent = unlockedCount;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('progressPercentage').textContent = `${percentage}%`;
            
            // Update progress ring
            const progressCircle = document.getElementById('progressCircle');
            const radius = 42;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;
            progressCircle.style.strokeDasharray = circumference;
            progressCircle.style.strokeDashoffset = offset;
            
            // Render milestones
            renderMilestones(totalSaved);
            
            // Render achievements
            const achievementsHTML = achievements.map(achievement => {
                const isUnlocked = unlockedAchievementIds.includes(achievement.id);
                const progress = Math.min(100, Math.round((totalSaved / achievement.threshold) * 100));
                
                return `
                    <div class="achievement-card ${isUnlocked ? 'unlocked' : 'locked'}">
                        <span class="achievement-badge">${isUnlocked ? 'Unlocked' : 'Locked'}</span>
                        <div class="achievement-icon"><i class="fas ${achievement.icon}"></i></div>
                        <div class="achievement-title">${achievement.name}</div>
                        <div class="achievement-description">${achievement.description}</div>
                        <div class="achievement-amount">₹${achievement.threshold.toLocaleString()}</div>
                        ${!isUnlocked ? `<div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem;">${progress}% complete</div>` : ''}
                    </div>
                `;
            }).join('');
            
            document.getElementById('achievementsGrid').innerHTML = achievementsHTML;
        }

        function renderMilestones(totalSaved) {
            const milestones = [
                { threshold: 1000, name: 'First ₹1K', icon: 'fa-star', description: 'Save your first ₹1,000' },
                { threshold: 10000, name: '₹10K Club', icon: 'fa-gem', description: 'Join the ₹10,000 club' },
                { threshold: 25000, name: 'Quarter Goal', icon: 'fa-award', description: 'Reach 25% of your goal' },
                { threshold: 50000, name: 'Halfway There', icon: 'fa-trophy', description: 'You\'re halfway to ₹100K!' },
                { threshold: 75000, name: 'Three Quarters', icon: 'fa-fire', description: '75% of your goal achieved' },
                { threshold: 100000, name: 'Goal Reached', icon: 'fa-flag-checkered', description: 'Congratulations! You did it!' }
            ];

            const milestonesHTML = milestones.map(milestone => {
                const completed = totalSaved >= milestone.threshold;
                return `
                    <div class="milestone-item ${completed ? 'completed' : ''}">
                        <div class="milestone-icon">
                            <i class="fas ${milestone.icon}"></i>
                        </div>
                        <div class="milestone-info">
                            <div class="milestone-title">${milestone.name}</div>
                            <div class="milestone-description">${milestone.description}</div>
                        </div>
                        <div class="milestone-status">${completed ? 'Completed' : 'Locked'}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('milestonesContainer').innerHTML = milestonesHTML;
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Mouse glow effect
        const mouseGlow = document.getElementById('mouseGlow');
        if (mouseGlow) {
            document.addEventListener('mousemove', (e) => {
                mouseGlow.style.left = e.clientX + 'px';
                mouseGlow.style.top = e.clientY + 'px';
                mouseGlow.classList.add('active');
            });

            document.addEventListener('mouseleave', () => {
                mouseGlow.classList.remove('active');
            });
        }

        // Navbar scroll effect
        if (navbar) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 20) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        }

        // Dropdown menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        
        if (menuToggle && menuDropdown) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDropdown.classList.toggle('open');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!menuDropdown.contains(e.target)) {
                    menuDropdown.classList.remove('open');
                }
            });
        }

        // Confetti animation function
        window.triggerConfetti = function() {
            const confettiCount = 150;
            const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];
            
            for (let i = 0; i < confettiCount; i++) {
                createConfetti(colors[Math.floor(Math.random() * colors.length)]);
            }
        };

        function createConfetti(color) {
            const confetti = document.createElement('div');
            confetti.style.cssText = `
                position: fixed;
                width: 10px;
                height: 10px;
                background: ${color};
                left: ${Math.random() * 100}vw;
                top: -10px;
                border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                pointer-events: none;
                z-index: 9999;
                animation: confettiFall ${2 + Math.random() * 2}s linear forwards;
            `;
            document.body.appendChild(confetti);
            
            setTimeout(() => confetti.remove(), 4000);
        }

        // Add confetti animation keyframes
        const style = document.createElement('style');
        style.textContent = `
            @keyframes confettiFall {
                0% {
                    transform: translateY(0) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(100vh) rotate(720deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Check for newly unlocked achievements and trigger confetti
        async function checkNewAchievements(user) {
            const userAchievements = await getUserAchievements(user.uid);
            if (userAchievements.success) {
                const unlockedCount = userAchievements.data.length;
                // If this is the first time loading with achievements, trigger confetti
                if (unlockedCount > 0 && !sessionStorage.getItem('confettiShown')) {
                    sessionStorage.setItem('confettiShown', 'true');
                    setTimeout(() => triggerConfetti(), 1000);
                }
            }
        }

        // Call confetti check after loading achievements
        onAuthStateChange(async (user) => {
            if (user) {
                await checkNewAchievements(user);
            }
        });

        // Hamburger menu toggle for mobile
        const hamburger = document.getElementById('hamburger');
        const navbarCenter = document.querySelector('.navbar-center');
        
        if (hamburger && navbarCenter) {
            hamburger.addEventListener('click', () => {
                navbarCenter.classList.toggle('open');
            });

            // Close menu when clicking a link
            navbarCenter.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    navbarCenter.classList.remove('open');
                });
            });

            // Close menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!navbarCenter.contains(e.target) && !hamburger.contains(e.target)) {
                    navbarCenter.classList.remove('open');
                }
            });
        }
    </script>
</body>
</html>
