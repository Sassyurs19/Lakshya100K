<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Lakshya ₹100K</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Premium Minimalist Background -->
    <div class="premium-background"></div>

    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <p style="color: var(--text-secondary); font-weight: 600;">Loading...</p>
        </div>
    </div>

    <div class="auth-container" id="authContainer" style="display: none;">
        <div class="auth-card">
            <div class="auth-brand">
                <a href="index.html" class="nav-brand">
                    <span>Lakshya</span><span class="brand-blue">₹100K</span>
                </a>
            </div>
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join us and start saving today</p>
            </div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <i data-lucide="user"></i>
                        <input type="text" class="form-input" name="fullName" required placeholder="John Doe">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <i data-lucide="at-sign"></i>
                        <input type="text" class="form-input" name="username" required placeholder="johndoe" pattern="[a-zA-Z0-9_]{3,20}" title="3-20 characters, letters, numbers, and underscores only">
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">
                        Letters, numbers, and underscores only
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <i data-lucide="mail"></i>
                        <input type="email" class="form-input" name="email" required placeholder="you@example.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <i data-lucide="lock"></i>
                        <input type="password" class="form-input" name="password" id="password" required placeholder="••••••••" minlength="8" style="padding-right: 44px;">
                        <button type="button" onclick="togglePassword('password')" class="password-toggle" id="password-icon-btn" title="Toggle password visibility">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">
                        Must be at least 8 chars with upper, lower, & number
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <i data-lucide="lock"></i>
                        <input type="password" class="form-input" name="confirmPassword" id="confirmPassword" required placeholder="••••••••" minlength="8" style="padding-right: 44px;">
                        <button type="button" onclick="togglePassword('confirmPassword')" class="password-toggle" id="confirmPassword-icon-btn" title="Toggle password visibility">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    Create account
                </button>
            </form>
            
            <div class="auth-footer">
                <span style="color: var(--text-secondary);">Already have an account? </span>
                <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign in</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { registerUser, onAuthStateChange } from './js/auth.js';
        import { showToast } from './js/utils.js';
        
        const loadingScreen = document.getElementById('loadingScreen');
        const authContainer = document.getElementById('authContainer');

        // Timeout fallback
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <p style="color: var(--danger); font-weight: 700; margin-bottom: 1rem;">Unable to connect. Please check your connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (user) {
                // User is authenticated, redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // User is not authenticated, show signup form
                authContainer.style.display = 'flex';
                lucide.createIcons();
            }
        });

        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const iconBtn = document.getElementById(fieldId + '-icon-btn');
            
            if (input.type === 'password') {
                input.type = 'text';
                iconBtn.innerHTML = '<i data-lucide="eye-off"></i>';
            } else {
                input.type = 'password';
                iconBtn.innerHTML = '<i data-lucide="eye"></i>';
            }
            lucide.createIcons();
        }

        window.togglePassword = togglePassword;

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = e.target.fullName.value.trim();
            const username = e.target.username.value.trim();
            const email = e.target.email.value.trim();
            const password = e.target.password.value;
            const confirmPassword = e.target.confirmPassword.value;
            
            if (!fullName || fullName.length < 2) {
                showToast('Full name must be at least 2 characters', 'error');
                return;
            }
            
            if (!username || username.length < 3) {
                showToast('Username must be at least 3 characters', 'error');
                return;
            }
            
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showToast('Username can only contain letters, numbers, and underscores', 'error');
                return;
            }
            
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('Please enter a valid email address', 'error');
                return;
            }
            
            if (!password || password.length < 8) {
                showToast('Password must be at least 8 characters', 'error');
                return;
            }
            
            if (!/[A-Z]/.test(password)) {
                showToast('Password must contain at least one uppercase letter', 'error');
                return;
            }
            
            if (!/[a-z]/.test(password)) {
                showToast('Password must contain at least one lowercase letter', 'error');
                return;
            }
            
            if (!/[0-9]/.test(password)) {
                showToast('Password must contain at least one number', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            
            const result = await registerUser({
                fullName,
                username,
                email,
                password,
                confirmPassword
            });
            
            if (result.success) {
                showToast('Account created successfully! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                showToast(result.error, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 32px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        .auth-brand {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .auth-brand .nav-brand {
            font-size: 1.5rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .auth-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .auth-header p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.875rem;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            padding: 0;
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
        }
    </style>
</body>
</html>
