<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lakshya ₹100K</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Premium Minimalist Background -->
    <div class="premium-background"></div>

    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <p style="color: var(--text-secondary); font-weight: 600;">Loading...</p>
        </div>
    </div>

    <div class="auth-container" id="authContainer" style="display: none;">
        <div class="auth-card">
            <div class="auth-brand">
                <a href="index.html" class="nav-brand">
                <svg class="brand-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 22H22L12 2Z" fill="url(#brandGrad)"/><circle cx="12" cy="14" r="3" fill="#ffffff"/><defs><linearGradient id="brandGrad" x1="2" y1="22" x2="22" y2="2" gradientUnits="userSpaceOnUse"><stop stop-color="#2563EB"/><stop offset="1" stop-color="#10B981"/></linearGradient></defs></svg>
                <span>Lakshya</span><span class="brand-blue">₹100K</span>
            </a>
            </div>
            <div class="auth-header">
                <h1>Welcome back</h1>
                <p>Sign in to continue your savings journey</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email or Username</label>
                    <div class="input-group">
                        <i data-lucide="mail"></i>
                        <input type="text" class="form-input" name="email" required placeholder="you@example.com or username">
                    </div>
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                        <label class="form-label" style="margin-bottom: 0;">Password</label>
                        <a href="#" id="forgotPassword" style="font-size: 0.8rem; color: var(--primary); font-weight: 600;">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <i data-lucide="lock"></i>
                        <input type="password" class="form-input" name="password" id="password" required placeholder="••••••••" style="padding-right: 44px;">
                        <button type="button" onclick="togglePassword('password')" class="password-toggle" id="password-icon-btn" title="Toggle password visibility">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    Sign in
                </button>
            </form>
            
            <div class="auth-footer">
                <span style="color: var(--text-secondary);">Don't have an account? </span>
                <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign up</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { loginUser, onAuthStateChange } from './js/auth.js';
        import { showToast } from './js/utils.js';
        
        const loadingScreen = document.getElementById('loadingScreen');
        const authContainer = document.getElementById('authContainer');

        // Timeout fallback
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <p style="color: var(--danger); font-weight: 700; margin-bottom: 1rem;">Unable to connect. Please check your connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (user) {
                // User is authenticated, redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // User is not authenticated, show login form
                authContainer.style.display = 'flex';
                lucide.createIcons();
            }
        });

        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const iconBtn = document.getElementById(fieldId + '-icon-btn');
            
            if (input.type === 'password') {
                input.type = 'text';
                iconBtn.innerHTML = '<i data-lucide="eye-off"></i>';
            } else {
                input.type = 'password';
                iconBtn.innerHTML = '<i data-lucide="eye"></i>';
            }
            lucide.createIcons();
        }

        window.togglePassword = togglePassword;

        // Forgot password handler
        document.getElementById('forgotPassword').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const { resetPassword } = await import('./js/auth.js');
            const email = prompt('Enter your email address to receive a password reset link:');
            if (!email) return;
            
            const result = await resetPassword(email);
            if (result.success) {
                showToast('Password reset email sent! Check your inbox.', 'success');
            } else {
                showToast(result.error, 'error');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identifier = e.target.email.value.trim();
            const password = e.target.password.value;
            
            if (!identifier) {
                showToast('Please enter your email or username', 'error');
                return;
            }
            
            if (!password) {
                showToast('Please enter your password', 'error');
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            const result = await loginUser(identifier, password);
            
            if (result.success) {
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                showToast(result.error, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 32px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        .auth-brand {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .auth-brand .nav-brand {
            font-size: 1.5rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .auth-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .auth-header p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.875rem;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            padding: 0;
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
        }
    </style>
</body>
</html>
