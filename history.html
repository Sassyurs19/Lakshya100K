<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </div>

    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <nav class="navbar" id="navbar" style="display: none;">
        <a href="dashboard.html" class="navbar-brand">Lakshya ₹100K</a>
        <div class="navbar-center">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="add-saving.html" class="nav-link">Add Saving</a>
            <a href="history.html" class="nav-link active">History</a>
            <a href="analytics.html" class="nav-link">Analytics</a>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <a href="achievements.html" class="nav-link">Achievements</a>
        </div>
        <div class="navbar-right">
            <div class="dropdown" id="menuDropdown">
                <div class="nav-link dropdown-toggle" id="menuToggle">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="dropdown-menu">
                    <a href="profile.html" class="dropdown-item">Profile</a>
                    <a href="settings.html" class="dropdown-item">Settings</a>
                    <div style="border-top: 1px solid var(--border-color); margin: var(--spacing-xs) 0;"></div>
                    <a href="#" class="dropdown-item logout" id="logoutBtn">Logout</a>
                </div>
            </div>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="main-content" id="main-content" style="display: none;">
        <h2 style="margin-bottom: 2rem;">Savings History</h2>
        
        <div class="card search-filter-bar">
            <input type="text" class="form-input search-input" id="searchInput" placeholder="Search by amount, category, or note...">
            <select class="form-input filter-select" id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="Cash">Cash</option>
                <option value="Bank">Bank</option>
                <option value="UPI">UPI</option>
                <option value="Wallet">Wallet</option>
                <option value="Investment">Investment</option>
                <option value="Other">Other</option>
            </select>
            <select class="form-input filter-select" id="timeFilter">
                <option value="all">All Time</option>
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
            </select>
        </div>
        
        <div class="savings-cards-grid" id="savingsGrid">
            <div class="empty-state" style="grid-column: 1 / -1;">
                <h3 class="empty-state-title">No savings yet</h3>
                <p class="empty-state-text">Start your savings journey today by adding your first saving!</p>
                <a href="add-saving.html" class="btn btn-primary">Add First Saving</a>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 2rem;">
            <button id="loadMoreBtn" class="btn btn-secondary" onclick="loadMoreSavings()" style="display: none;">
                Load More
            </button>
        </div>
    </main>

    <div id="imageModal" class="modal">
        <button class="modal-close" onclick="closeModal()">
            <i class="fas fa-times"></i>
        </button>
        <img id="modalImage" class="modal-content" src="">
    </div>

    <style>
        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-filter-bar {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .search-input {
            flex: 1;
        }

        .filter-select {
            width: auto;
            min-width: 150px;
        }

        .savings-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing-lg);
        }

        .saving-card {
            padding: var(--spacing-lg);
        }

        .saving-thumbnail {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: var(--radius-md);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
            .search-filter-bar {
                flex-direction: column;
            }
            .filter-select {
                width: 100%;
            }
        }
    </style>

    <script type="module">
        import { onAuthStateChange, logoutUser, getCurrentUser } from './js/auth.js';
        import { getUserSavingsPaginated, deleteSaving } from './js/database.js';
        import { showToast, debounce } from './js/utils.js';

        const loadingScreen = document.getElementById('loadingScreen');
        const navbar = document.getElementById('navbar');
        const mainContent = document.getElementById('main-content');

        let currentPage = 1;
        let lastDoc = null;
        let hasMore = true;
        const savingsPerPage = 20;

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            loadingScreen.style.display = 'none';
            
            if (!user) {
                window.location.href = 'login.html';
            } else {
                navbar.style.display = 'block';
                mainContent.style.display = 'block';
                loadSavings(user);
            }
        });

        async function loadSavings(user, reset = false) {
            if (reset) {
                currentPage = 1;
                lastDoc = null;
                hasMore = true;
                document.getElementById('savingsGrid').innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 2rem;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                    </div>
                `;
            }

            const result = await getUserSavingsPaginated(user.uid, savingsPerPage, lastDoc);
            
            if (result.success && result.data.length > 0) {
                const savings = result.data;
                lastDoc = result.lastDoc;
                hasMore = result.hasMore;
                
                const savingsHTML = savings.map((saving) => {
                    return `
                        <div class="card saving-card" data-category="${saving.category}" data-date="${saving.date}" data-amount="${saving.amount}" data-note="${saving.note || ''}" data-id="${saving.id}">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                                <div>
                                    <div style="font-size: 1.75rem; font-weight: 600;">
                                        ₹${saving.amount.toLocaleString()}
                                    </div>
                                    <div style="color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.25rem;">
                                        ${new Date(saving.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
                                        ${saving.time ? ` at ${saving.time}` : ''}
                                    </div>
                                </div>
                                <div style="background: var(--bg-tertiary); padding: 0.25rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.875rem;">
                                    ${saving.category}
                                </div>
                            </div>
                            
                            ${saving.note ? `
                            <div style="color: var(--text-secondary); margin-bottom: 1rem; line-height: 1.5; font-size: 0.875rem;">
                                ${saving.note.length > 100 ? saving.note.substring(0, 100) + '...' : saving.note}
                            </div>
                            ` : ''}
                            
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                ${saving.imageURL ? `
                                <img src="${saving.imageURL}" class="saving-thumbnail" loading="lazy" onclick="openModal('${saving.imageURL}')">
                                ` : '<div style="flex: 1;"></div>'}
                                
                                <div style="display: flex; gap: 0.5rem;">
                                    <button onclick="viewSaving('${saving.id}')" class="btn btn-secondary btn-sm" title="View Details">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button onclick="editSaving('${saving.id}')" class="btn btn-secondary btn-sm" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteSavingHandler('${saving.id}')" class="btn btn-danger btn-sm" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.8rem;">
                                Running Total: <strong>₹${(saving.runningTotal || 0).toLocaleString()}</strong>
                            </div>
                        </div>
                    `;
                }).join('');
                
                if (reset) {
                    document.getElementById('savingsGrid').innerHTML = savingsHTML;
                } else {
                    document.getElementById('savingsGrid').innerHTML += savingsHTML;
                }
                
                // Show/hide load more button
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                if (loadMoreBtn) {
                    loadMoreBtn.style.display = hasMore ? 'block' : 'none';
                }
            } else if (reset) {
                // Show empty state
                document.getElementById('savingsGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">
                            <i class="fas fa-piggy-bank"></i>
                        </div>
                        <h3 class="empty-state-title">No savings recorded yet</h3>
                        <p class="empty-state-text">Start your savings journey today by adding your first saving!</p>
                        <a href="add-saving.html" class="btn btn-primary">Add Your First Saving</a>
                    </div>
                `;
                
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                if (loadMoreBtn) {
                    loadMoreBtn.style.display = 'none';
                }
            }
        }

        window.deleteSavingHandler = async function(savingId) {
            if (confirm('Are you sure you want to delete this saving? This action cannot be undone.')) {
                const result = await deleteSaving(savingId);
                if (result.success) {
                    showToast('Saving deleted successfully', 'success');
                    location.reload();
                } else {
                    showToast(result.error, 'error');
                }
            }
        };

        window.loadMoreSavings = function() {
            const user = getCurrentUser();
            if (user) {
                currentPage++;
                loadSavings(user, false);
            }
        };

        // Instant search with debounce
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const timeFilter = document.getElementById('timeFilter');

        const filterSavings = debounce(() => {
            const searchTerm = searchInput.value.toLowerCase();
            const category = categoryFilter.value;
            const time = timeFilter.value;
            
            const cards = document.querySelectorAll('.saving-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const cardCategory = card.dataset.category;
                const cardDate = card.dataset.date;
                const cardAmount = card.dataset.amount;
                const cardNote = card.dataset.note.toLowerCase();
                
                let matchesSearch = true;
                let matchesCategory = true;
                let matchesTime = true;

                // Search filter
                if (searchTerm) {
                    matchesSearch = cardAmount.includes(searchTerm) || 
                                    cardCategory.toLowerCase().includes(searchTerm) || 
                                    cardNote.includes(searchTerm);
                }

                // Category filter
                if (category !== 'all') {
                    matchesCategory = cardCategory === category;
                }

                // Time filter
                if (time !== 'all') {
                    const savingDate = new Date(cardDate);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    
                    if (time === 'today') {
                        matchesTime = savingDate.toDateString() === today.toDateString();
                    } else if (time === 'week') {
                        const weekAgo = new Date(today);
                        weekAgo.setDate(weekAgo.getDate() - 7);
                        matchesTime = savingDate >= weekAgo;
                    } else if (time === 'month') {
                        const monthAgo = new Date(today);
                        monthAgo.setMonth(monthAgo.getMonth() - 1);
                        matchesTime = savingDate >= monthAgo;
                    }
                }

                if (matchesSearch && matchesCategory && matchesTime) {
                    card.style.display = '';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            // Show empty state if no results
            if (visibleCount === 0 && cards.length > 0) {
                const grid = document.getElementById('savingsGrid');
                if (!document.querySelector('.no-results')) {
                    const emptyState = document.createElement('div');
                    emptyState.className = 'empty-state no-results';
                    emptyState.style.gridColumn = '1 / -1';
                    emptyState.innerHTML = `
                        <h3 class="empty-state-title">No matching savings</h3>
                        <p class="empty-state-text">Try adjusting your search or filters</p>
                    `;
                    grid.appendChild(emptyState);
                }
            } else {
                const noResults = document.querySelector('.no-results');
                if (noResults) noResults.remove();
            }
        }, 300);

        searchInput.addEventListener('input', filterSavings);
        categoryFilter.addEventListener('change', filterSavings);
        timeFilter.addEventListener('change', filterSavings);

        window.viewSaving = async function(savingId) {
            // Get saving details from the card data
            const card = document.querySelector(`[data-id="${savingId}"]`);
            if (!card) return;
            
            const amount = card.querySelector('.saving-card > div:first-child > div:first-child > div').textContent;
            const date = card.querySelector('.saving-card > div:first-child > div:first-child > div:last-child').textContent;
            const category = card.querySelector('.saving-card > div:first-child > div:last-child').textContent;
            const note = card.querySelector('.saving-card > div:nth-child(2)')?.textContent || '';
            const runningTotal = card.querySelector('.saving-card > div:last-child strong').textContent;
            const img = card.querySelector('.saving-thumbnail');
            const imageURL = img ? img.src : null;
            
            const modalHTML = `
                <div class="modal active" id="savingModal" style="display: flex;">
                    <div class="modal-content" style="max-width: 600px; padding: 2rem;">
                        <button onclick="closeSavingModal()" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary);">
                            <i class="fas fa-times"></i>
                        </button>
                        
                        <h2 style="margin-bottom: 1.5rem;">Saving Details</h2>
                        
                        ${imageURL ? `
                        <div style="margin-bottom: 1.5rem;">
                            <img src="${imageURL}" style="width: 100%; max-height: 400px; object-fit: contain; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                        </div>
                        ` : ''}
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                            <div>
                                <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Amount</div>
                                <div style="font-size: 1.5rem; font-weight: 600;">${amount}</div>
                            </div>
                            <div>
                                <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Category</div>
                                <div style="font-size: 1.5rem; font-weight: 600;">${category}</div>
                            </div>
                        </div>
                        
                        <div style="margin-bottom: 1rem;">
                            <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Date & Time</div>
                            <div style="font-size: 1.125rem;">${date}</div>
                        </div>
                        
                        ${note ? `
                        <div style="margin-bottom: 1rem;">
                            <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Note</div>
                            <div style="font-size: 1rem; line-height: 1.6;">${note}</div>
                        </div>
                        ` : ''}
                        
                        <div style="margin-bottom: 1.5rem; padding: 1rem; background: var(--bg-tertiary); border-radius: var(--radius-md);">
                            <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Running Total</div>
                            <div style="font-size: 1.5rem; font-weight: 600; color: var(--primary);">${runningTotal}</div>
                        </div>
                        
                        <div style="display: flex; gap: 1rem;">
                            <button onclick="editSaving('${savingId}'); closeSavingModal();" class="btn btn-secondary" style="flex: 1;">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button onclick="deleteSavingHandler('${savingId}')" class="btn btn-danger" style="flex: 1;">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            // Remove existing modal if any
            const existingModal = document.getElementById('savingModal');
            if (existingModal) existingModal.remove();
            
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        };

        window.closeSavingModal = function() {
            const modal = document.getElementById('savingModal');
            if (modal) modal.remove();
        };

        window.editSaving = function(savingId) {
            window.location.href = `edit-saving.html?id=${savingId}`;
        };

        window.openModal = function(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('active');
        };

        window.closeModal = function() {
            document.getElementById('imageModal').classList.remove('active');
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Dropdown menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        
        if (menuToggle && menuDropdown) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDropdown.classList.toggle('open');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!menuDropdown.contains(e.target)) {
                    menuDropdown.classList.remove('open');
                }
            });
        }

        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('navbarNav').classList.toggle('open');
        });
    </script>
</body>
</html>
