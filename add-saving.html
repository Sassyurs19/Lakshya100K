<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Saving - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-brand">Lakshya ₹100K</a>
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="navbar-nav" id="navbarNav">
            <div class="dropdown" id="menuDropdown">
                <div class="nav-link dropdown-toggle" id="menuToggle">Menu</div>
                <div class="dropdown-menu">
                    <a href="dashboard.html" class="dropdown-item">Dashboard</a>
                    <a href="history.html" class="dropdown-item">History</a>
                    <a href="analytics.html" class="dropdown-item">Analytics</a>
                    <a href="gallery.html" class="dropdown-item">Gallery</a>
                    <a href="achievements.html" class="dropdown-item">Achievements</a>
                    <a href="profile.html" class="dropdown-item">Profile</a>
                    <a href="settings.html" class="dropdown-item">Settings</a>
                </div>
            </div>
            <a href="#" class="nav-link logout" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                <a href="dashboard.html" class="btn btn-secondary btn-sm">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <h2 style="margin: 0;">
                    Add New Saving
                </h2>
            </div>
            
            <form id="addSavingForm">
                <div class="form-group">
                    <label class="form-label">Amount *</label>
                    <input type="number" class="form-input" name="amount" required placeholder="Enter amount" min="1" max="100000000">
                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">
                        Maximum: ₹1,00,00,000
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-input" name="date" id="dateInput" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Time</label>
                        <input type="time" class="form-input" name="time" id="timeInput" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-input" name="category" required>
                        <option value="Cash">Cash</option>
                        <option value="UPI">UPI</option>
                        <option value="Bank">Bank</option>
                        <option value="Wallet">Wallet</option>
                        <option value="Investment">Investment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Note (Optional)</label>
                    <textarea class="form-input form-textarea" name="note" placeholder="Add a note about this saving..." maxlength="500"></textarea>
                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">
                        Maximum 500 characters
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Image Proof (Optional)</label>
                    <div class="file-upload" onclick="document.getElementById('imageInput').click()">
                        <input type="file" id="imageInput" name="image" accept="image/jpeg,image/jpg,image/png,image/webp" onchange="previewImage(this)">
                        <div class="file-upload-icon">
                            <i class="fas fa-cloud-upload-alt"></i>
                        </div>
                        <div class="file-upload-text">Click to upload proof image (JPG, PNG, WebP - Max 5MB)</div>
                    </div>
                    <div id="imagePreview" style="margin-top: 1rem; display: none; position: relative;">
                        <img id="previewImg" style="max-width: 200px; max-height: 200px; border-radius: var(--radius-md); object-fit: cover;">
                        <button type="button" onclick="removeImage()" style="position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-times" style="font-size: 0.75rem;"></i>
                        </button>
                    </div>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" onclick="resetForm()" class="btn btn-secondary" style="flex: 1;">
                        Reset
                    </button>
                    <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center; padding: 1rem;">
                        Save Saving
                    </button>
                </div>
            </form>
        </div>
    </main>

    <style>
        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
        }
    </style>

    <script type="module">
        import { onAuthStateChange, logoutUser, getCurrentUser, initializeAuthGuard } from './js/auth.js';
        import { addSaving } from './js/database.js';
        import { uploadSavingImage } from './js/storage.js';
        import { showToast } from './js/utils.js';

        initializeAuthGuard();

        // Check authentication
        onAuthStateChange((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                // Set default date and time
                const now = new Date();
                document.getElementById('dateInput').value = now.toISOString().split('T')[0];
                document.getElementById('timeInput').value = now.toTimeString().slice(0, 5);
            }
        });

        // Preview image
        window.previewImage = function(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // Validate file size (5MB)
                if (file.size > 5 * 1024 * 1024) {
                    showToast('Image size must be less than 5 MB', 'error');
                    input.value = '';
                    return;
                }
                
                // Validate file type
                const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp'];
                if (!allowedTypes.includes(file.type)) {
                    showToast('Only JPG, PNG, and WebP images are allowed', 'error');
                    input.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        };

        // Remove image
        window.removeImage = function() {
            document.getElementById('imageInput').value = '';
            document.getElementById('previewImg').src = '';
            document.getElementById('imagePreview').style.display = 'none';
        };

        // Reset form
        window.resetForm = function() {
            document.getElementById('addSavingForm').reset();
            window.removeImage();
            
            // Reset date and time to now
            const now = new Date();
            document.getElementById('dateInput').value = now.toISOString().split('T')[0];
            document.getElementById('timeInput').value = now.toTimeString().slice(0, 5);
        };

        // Handle form submission
        document.getElementById('addSavingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = getCurrentUser();
            if (!user) {
                showToast('Please login first', 'error');
                return;
            }
            
            const amount = parseInt(e.target.amount.value);
            const date = e.target.date.value;
            const time = e.target.time.value;
            const category = e.target.category.value;
            const note = e.target.note.value.trim();
            const imageFile = e.target.image.files[0];
            
            // Validate amount
            if (isNaN(amount) || amount <= 0) {
                showToast('Please enter a valid amount greater than zero', 'error');
                return;
            }
            
            if (amount > 100000000) {
                showToast('Amount cannot exceed ₹1,00,00,000', 'error');
                return;
            }
            
            // Prevent duplicate submission
            const submitBtn = e.target.querySelector('button[type="submit"]');
            if (submitBtn.disabled) return;
            
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            let imageURL = null;
            let imagePath = null;
            
            // Upload image if provided
            if (imageFile) {
                const savingId = Date.now().toString();
                const uploadResult = await uploadSavingImage(imageFile, user.uid, savingId);
                if (uploadResult.success) {
                    imageURL = uploadResult.url;
                    imagePath = `proofs/${user.uid}/${savingId}_${Date.now()}.jpg`;
                } else {
                    showToast(uploadResult.error, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
            }
            
            // Add saving to Firestore
            const savingData = {
                userId: user.uid,
                amount,
                date,
                time,
                category,
                note,
                imageUrl,
                imagePath
            };
            
            const result = await addSaving(savingData);
            
            if (result.success) {
                showToast('Saving added successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showToast(result.error, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Dropdown menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        
        if (menuToggle && menuDropdown) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDropdown.classList.toggle('open');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!menuDropdown.contains(e.target)) {
                    menuDropdown.classList.remove('open');
                }
            });
        }

        // Mobile menu
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('navbarNav').classList.toggle('open');
        });
    </script>
</body>
</html>
