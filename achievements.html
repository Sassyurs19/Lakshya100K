<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </div>

    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <nav class="navbar" id="navbar" style="display: none;">
        <a href="dashboard.html" class="navbar-brand">
            <span class="brand-name">Lakshya</span>
            <span class="brand-amount">₹100K</span>
        </a>
        <div class="navbar-center">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="add-saving.html" class="nav-link">Add Saving</a>
            <a href="history.html" class="nav-link">History</a>
            <a href="analytics.html" class="nav-link">Analytics</a>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <a href="achievements.html" class="nav-link active">Achievements</a>
            <a href="settings.html" class="nav-link">Settings</a>
        </div>
        <div class="navbar-right">
            <div class="dropdown" id="menuDropdown">
                <div class="dropdown-toggle" id="menuToggle">
                    <div class="avatar" id="userAvatar">U</div>
                    <span class="username-display" id="usernameDisplay">@username</span>
                </div>
                <div class="dropdown-menu">
                    <a href="profile.html" class="dropdown-item">
                        <i class="fas fa-user"></i>
                        Profile
                    </a>
                    <a href="settings.html" class="dropdown-item">
                        <i class="fas fa-cog"></i>
                        Settings
                    </a>
                    <div style="border-top: 1px solid var(--border-color); margin: var(--spacing-sm) 0;"></div>
                    <a href="#" class="dropdown-item logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </a>
                </div>
            </div>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content" style="display: none;">
        <h2 style="margin-bottom: 2rem;">Achievements</h2>
        
        <!-- Summary Card -->
        <div class="card" style="margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 style="margin-bottom: 0.5rem;">Your Progress</h3>
                    <p style="margin: 0; color: var(--text-secondary);">
                        <span id="unlockedCount">0</span> / <span id="totalCount">10</span> Achievements Unlocked
                    </p>
                </div>
                <i class="fas fa-medal" style="font-size: 3rem; color: var(--primary);"></i>
            </div>
        </div>

        <!-- Achievements Grid -->
        <div class="grid grid-3" id="achievementsGrid">
            <!-- Achievements will be loaded here -->
        </div>
    </main>

    <style>
        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
            
            .grid-3 {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script type="module">
        import { onAuthStateChange, logoutUser, getCurrentUser } from './js/auth.js';
        import { calculateStatistics, getUserAchievements } from './js/database.js';
        import { showToast } from './js/utils.js';

        const loadingScreen = document.getElementById('loadingScreen');
        const navbar = document.getElementById('navbar');
        const mainContent = document.getElementById('main-content');

        const achievements = [
            { id: 'first_saving', name: 'First Saving', icon: 'fa-crosshairs', threshold: 1, description: 'Add your first saving' },
            { id: 'hundred', name: '₹100', icon: 'fa-coins', threshold: 100, description: 'Save ₹100' },
            { id: 'five_hundred', name: '₹500', icon: 'fa-money-bill', threshold: 500, description: 'Save ₹500' },
            { id: 'thousand', name: '₹1,000', icon: 'fa-gem', threshold: 1000, description: 'Save ₹1,000' },
            { id: 'five_thousand', name: '₹5,000', icon: 'fa-trophy', threshold: 5000, description: 'Save ₹5,000' },
            { id: 'ten_thousand', name: '₹10,000', icon: 'fa-star', threshold: 10000, description: 'Save ₹10,000' },
            { id: 'twenty_five_thousand', name: '₹25,000', icon: 'fa-award', threshold: 25000, description: 'Save ₹25,000' },
            { id: 'fifty_thousand', name: '₹50,000', icon: 'fa-crown', threshold: 50000, description: 'Save ₹50,000' },
            { id: 'seventy_five_thousand', name: '₹75,000', icon: 'fa-fire', threshold: 75000, description: 'Save ₹75,000' },
            { id: 'one_hundred_thousand', name: '₹100,000', icon: 'fa-flag-checkered', threshold: 100000, description: 'Reach your goal!' }
        ];

        // Timeout fallback - if auth doesn't resolve in 5 seconds, show error
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout - Firebase may not be initialized');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: var(--danger); margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Unable to connect. Please check your internet connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (!user) {
                window.location.href = 'login.html';
            } else {
                navbar.style.display = 'block';
                mainContent.style.display = 'block';
                loadUserInfo(user);
                loadAchievements(user);
            }
        });

        async function loadUserInfo(user) {
            const userDoc = await getUserDocument(user.uid);
            if (userDoc.success) {
                const userData = userDoc.data;
                const username = userData.username || 'user';
                const usernameDisplay = document.getElementById('usernameDisplay');
                const userAvatar = document.getElementById('userAvatar');
                
                if (usernameDisplay) usernameDisplay.textContent = `@${username}`;
                if (userAvatar) {
                    const userInitial = (userData.fullName || userData.username || 'U').charAt(0).toUpperCase();
                    userAvatar.textContent = userInitial;
                }
            }
        }

        // Load achievements
        async function loadAchievements(user) {
            const stats = await calculateStatistics(user.uid);
            const userAchievements = await getUserAchievements(user.uid);
            
            const unlockedAchievementIds = userAchievements.success 
                ? userAchievements.data.map(a => a.name)
                : [];
            
            const totalSaved = stats.success ? stats.data.totalSaved : 0;
            
            // Update summary
            document.getElementById('unlockedCount').textContent = unlockedAchievementIds.length;
            document.getElementById('totalCount').textContent = achievements.length;
            
            // Render achievements
            const achievementsHTML = achievements.map(achievement => {
                const isUnlocked = unlockedAchievementIds.includes(achievement.id);
                const progress = Math.min(100, Math.round((totalSaved / achievement.threshold) * 100));
                
                return `
                    <div class="achievement-card card ${isUnlocked ? 'unlocked' : 'locked'}">
                        <div class="achievement-icon"><i class="fas ${achievement.icon}"></i></div>
                        <div class="achievement-name">${achievement.name}</div>
                        <div class="achievement-status">
                            ${isUnlocked ? 'Unlocked!' : `Progress: ${progress}%`}
                        </div>
                        <div style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);">
                            ${achievement.description}
                        </div>
                        ${!isUnlocked ? `
                        <div class="progress-bar" style="margin-top: 1rem;">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            document.getElementById('achievementsGrid').innerHTML = achievementsHTML;
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Dropdown menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        
        if (menuToggle && menuDropdown) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDropdown.classList.toggle('open');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!menuDropdown.contains(e.target)) {
                    menuDropdown.classList.remove('open');
                }
            });
        }

        // Hamburger menu toggle for mobile
        const hamburger = document.getElementById('hamburger');
        const navbarCenter = document.querySelector('.navbar-center');
        
        if (hamburger && navbarCenter) {
            hamburger.addEventListener('click', () => {
                navbarCenter.classList.toggle('open');
            });

            // Close menu when clicking a link
            navbarCenter.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    navbarCenter.classList.remove('open');
                });
            });

            // Close menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!navbarCenter.contains(e.target) && !hamburger.contains(e.target)) {
                    navbarCenter.classList.remove('open');
                }
            });
        }
    </script>
</body>
</html>
