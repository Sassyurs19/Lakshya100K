<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </div>

    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <nav class="navbar" id="navbar" style="display: none;">
        <a href="dashboard.html" class="navbar-brand">
            <span class="brand-name">Lakshya</span>
            <span class="brand-amount">₹100K</span>
        </a>
        <div class="navbar-center">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="add-saving.html" class="nav-link">Add Saving</a>
            <a href="history.html" class="nav-link">History</a>
            <a href="analytics.html" class="nav-link">Analytics</a>
            <a href="gallery.html" class="nav-link active">Gallery</a>
            <a href="achievements.html" class="nav-link">Achievements</a>
            <a href="settings.html" class="nav-link">Settings</a>
        </div>
        <div class="navbar-right">
            <div class="dropdown" id="menuDropdown">
                <div class="dropdown-toggle" id="menuToggle">
                    <div class="avatar" id="userAvatar">U</div>
                    <span class="username-display" id="usernameDisplay">@username</span>
                </div>
                <div class="dropdown-menu">
                    <a href="profile.html" class="dropdown-item">
                        <i class="fas fa-user"></i>
                        Profile
                    </a>
                    <a href="settings.html" class="dropdown-item">
                        <i class="fas fa-cog"></i>
                        Settings
                    </a>
                    <div style="border-top: 1px solid var(--border-color); margin: var(--spacing-sm) 0;"></div>
                    <a href="#" class="dropdown-item logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </a>
                </div>
            </div>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="main-content" id="main-content" style="display: none;">
        <h1 style="margin-bottom: 2rem;">Proof Gallery</h1>
        
        <div class="gallery-masonry" id="galleryGrid">
            <div class="empty-state" style="grid-column: 1 / -1;">
                <div class="empty-state-icon">
                    <i class="fas fa-images"></i>
                </div>
                <h3 class="empty-state-title">No images yet</h3>
                <p class="empty-state-text">Add savings with proof images to see them here</p>
                <a href="add-saving.html" class="btn btn-primary">Add Saving with Image</a>
            </div>
        </div>
    </main>

    <div id="imageModal" class="modal">
        <button class="modal-close" onclick="closeModal()">
            <i class="fas fa-times"></i>
        </button>
        <button class="modal-nav modal-prev" onclick="navigateModal(-1)">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="modal-nav modal-next" onclick="navigateModal(1)">
            <i class="fas fa-chevron-right"></i>
        </button>
        <div class="modal-image-container">
            <img id="modalImage" class="modal-content" src="" onclick="toggleZoom()">
        </div>
        <div class="modal-actions">
            <button onclick="zoomIn()" class="btn btn-secondary btn-sm">
                <i class="fas fa-search-plus"></i>
            </button>
            <button onclick="zoomOut()" class="btn btn-secondary btn-sm">
                <i class="fas fa-search-minus"></i>
            </button>
            <button onclick="downloadImage()" class="btn btn-primary btn-sm">
                <i class="fas fa-download"></i> Download
            </button>
            <button onclick="deleteImage()" class="btn btn-danger btn-sm">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
    </div>

    <style>
        .main-content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-masonry {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: var(--spacing-lg);
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.2s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 1rem;
            color: white;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-amount {
            font-size: 1rem;
            font-weight: 600;
        }

        .gallery-date {
            font-size: 0.75rem;
            opacity: 0.9;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: var(--radius-md);
            transition: transform 0.3s ease;
            cursor: zoom-in;
        }

        .modal-image-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease;
            z-index: 10;
        }

        .modal-nav:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-prev {
            left: 1rem;
        }

        .modal-next {
            right: 1rem;
        }

        .modal-actions {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .modal-content.zoomed {
            cursor: zoom-out;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
            .modal-nav {
                width: 40px;
                height: 40px;
            }
            .modal-actions {
                flex-wrap: wrap;
                justify-content: center;
                width: 90%;
            }
        }
    </style>

    <script type="module">
        import { onAuthStateChange, logoutUser } from './js/auth.js';
        import { getUserSavings, getUserDocument } from './js/database.js';

        const loadingScreen = document.getElementById('loadingScreen');
        const navbar = document.getElementById('navbar');
        const mainContent = document.getElementById('main-content');

        let currentImageURL = '';
        let allImages = [];
        let currentIndex = 0;
        let zoomLevel = 1;

        // Timeout fallback - if auth doesn't resolve in 5 seconds, show error
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout - Firebase may not be initialized');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: var(--danger); margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Unable to connect. Please check your internet connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (!user) {
                window.location.href = 'login.html';
            } else {
                navbar.style.display = 'block';
                mainContent.style.display = 'block';
                loadUserInfo(user);
                loadGallery(user);
            }
        });

        async function loadUserInfo(user) {
            const userDoc = await getUserDocument(user.uid);
            if (userDoc.success) {
                const userData = userDoc.data;
                const username = userData.username || 'user';
                const usernameDisplay = document.getElementById('usernameDisplay');
                const userAvatar = document.getElementById('userAvatar');
                
                if (usernameDisplay) usernameDisplay.textContent = `@${username}`;
                if (userAvatar) {
                    const userInitial = (userData.fullName || userData.username || 'U').charAt(0).toUpperCase();
                    userAvatar.textContent = userInitial;
                }
            }
        }

        async function loadGallery(user) {
            const result = await getUserSavings(user.uid);
            if (result.success) {
                const savingsWithImages = result.data.filter(s => s.imageURL);
                allImages = savingsWithImages;
                
                if (savingsWithImages.length > 0) {
                    const galleryHTML = savingsWithImages.map((saving, index) => `
                        <div class="card gallery-item" onclick="openModal('${saving.imageURL}', ${index})">
                            <img src="${saving.imageURL}" alt="Saving proof" loading="lazy">
                            <div class="gallery-overlay">
                                <div class="gallery-amount">₹${saving.amount.toLocaleString()}</div>
                                <div class="gallery-date">${new Date(saving.date).toLocaleDateString()}</div>
                            </div>
                        </div>
                    `).join('');
                    
                    document.getElementById('galleryGrid').innerHTML = galleryHTML;
                }
            }
        }

        window.openModal = function(src, index) {
            currentImageURL = src;
            currentIndex = index;
            zoomLevel = 1;
            document.getElementById('modalImage').src = src;
            document.getElementById('modalImage').style.transform = 'scale(1)';
            document.getElementById('modalImage').classList.remove('zoomed');
            document.getElementById('imageModal').classList.add('active');
        };

        window.closeModal = function() {
            document.getElementById('imageModal').classList.remove('active');
            zoomLevel = 1;
        };

        window.navigateModal = function(direction) {
            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < allImages.length) {
                currentIndex = newIndex;
                currentImageURL = allImages[currentIndex].imageURL;
                zoomLevel = 1;
                document.getElementById('modalImage').src = currentImageURL;
                document.getElementById('modalImage').style.transform = 'scale(1)';
                document.getElementById('modalImage').classList.remove('zoomed');
            }
        };

        window.toggleZoom = function() {
            const img = document.getElementById('modalImage');
            if (zoomLevel === 1) {
                zoomLevel = 2;
                img.style.transform = 'scale(2)';
                img.classList.add('zoomed');
            } else {
                zoomLevel = 1;
                img.style.transform = 'scale(1)';
                img.classList.remove('zoomed');
            }
        };

        window.zoomIn = function() {
            if (zoomLevel < 3) {
                zoomLevel += 0.5;
                document.getElementById('modalImage').style.transform = `scale(${zoomLevel})`;
                document.getElementById('modalImage').classList.add('zoomed');
            }
        };

        window.zoomOut = function() {
            if (zoomLevel > 1) {
                zoomLevel -= 0.5;
                document.getElementById('modalImage').style.transform = `scale(${zoomLevel})`;
                if (zoomLevel === 1) {
                    document.getElementById('modalImage').classList.remove('zoomed');
                }
            }
        };

        window.downloadImage = function() {
            const a = document.createElement('a');
            a.href = currentImageURL;
            a.download = 'saving-proof.jpg';
            a.target = '_blank';
            a.click();
        };

        window.deleteImage = async function() {
            if (confirm('Are you sure you want to delete this saving? This action cannot be undone.')) {
                const saving = allImages[currentIndex];
                if (saving && saving.id) {
                    const { deleteSaving } = await import('./js/database.js');
                    const result = await deleteSaving(saving.id);
                    if (result.success) {
                        closeModal();
                        const user = onAuthStateChange._currentUser;
                        if (user) loadGallery(user);
                    }
                }
            }
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            } else if (e.key === 'ArrowLeft') {
                navigateModal(-1);
            } else if (e.key === 'ArrowRight') {
                navigateModal(1);
            }
        });

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Dropdown menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        
        if (menuToggle && menuDropdown) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDropdown.classList.toggle('open');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!menuDropdown.contains(e.target)) {
                    menuDropdown.classList.remove('open');
                }
            });
        }

        // Hamburger menu toggle for mobile
        const hamburger = document.getElementById('hamburger');
        const navbarCenter = document.querySelector('.navbar-center');
        
        if (hamburger && navbarCenter) {
            hamburger.addEventListener('click', () => {
                navbarCenter.classList.toggle('open');
            });

            // Close menu when clicking a link
            navbarCenter.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    navbarCenter.classList.remove('open');
                });
            });

            // Close menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!navbarCenter.contains(e.target) && !hamburger.contains(e.target)) {
                    navbarCenter.classList.remove('open');
                }
            });
        }
    </script>
</body>
</html>
