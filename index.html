<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshya ₹100K - Small Savings. Big Dreams.</title>
    <meta name="description" content="Track every rupee, build lasting habits, and reach your ₹1,00,000 goal with confidence.">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </div>

    <!-- Premium Animated Background -->
    <div class="premium-background">
        <div class="gradient-blob gradient-blob-1"></div>
        <div class="gradient-blob gradient-blob-2"></div>
        <div class="gradient-blob gradient-blob-3"></div>
        <div class="grid-pattern"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="mouse-glow" id="mouseGlow"></div>
    </div>

    <div class="hero-section" id="heroSection" style="display: none;">
        <!-- Floating currency elements -->
        <div class="floating-symbol fs-1">₹</div>
        <div class="floating-symbol fs-2">$</div>
        <div class="floating-symbol fs-3">€</div>
        <div class="floating-symbol fs-4"><i class="fas fa-coins"></i></div>
        <div class="floating-symbol fs-5"><i class="fas fa-chart-line"></i></div>
        <div class="floating-symbol fs-6"><i class="fas fa-piggy-bank"></i></div>
        <div class="floating-symbol fs-7">₹</div>
        
        <div class="hero-content fade-in">
            <h1 class="hero-title">Save Today.<br>Achieve Tomorrow.</h1>
            <p class="hero-subtitle">Track every rupee, build lasting habits, and reach your ₹1,00,000 goal with confidence.</p>
            <div class="hero-buttons">
                <a href="signup.html" class="btn btn-primary btn-lg">
                    Create Account
                </a>
                <a href="login.html" class="btn btn-outline btn-lg">
                    Login
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { onAuthStateChange } from './js/auth.js';
        
        const loadingScreen = document.getElementById('loadingScreen');
        const heroSection = document.getElementById('heroSection');

        // Timeout fallback - if auth doesn't resolve in 5 seconds, show error
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout - Firebase may not be initialized');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: var(--danger); margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Unable to connect. Please check your internet connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (user) {
                // User is authenticated, redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // User is not authenticated, show landing page
                heroSection.style.display = 'flex';
            }
        });
        // Mouse glow effect
        const mouseGlow = document.getElementById('mouseGlow');
        if (mouseGlow) {
            document.addEventListener('mousemove', (e) => {
                mouseGlow.style.left = e.clientX + 'px';
                mouseGlow.style.top = e.clientY + 'px';
                mouseGlow.classList.add('active');
            });

            document.addEventListener('mouseleave', () => {
                mouseGlow.classList.remove('active');
            });
        }
    </script>

    <style>
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .hero-subtitle {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Floating Symbols Animation */
        .floating-symbol {
            position: absolute;
            color: var(--primary);
            opacity: 0.12;
            pointer-events: none;
            user-select: none;
            z-index: 1;
            font-weight: 700;
            animation: floatUp 8s ease-in-out infinite;
        }

        .fs-1 { font-size: 4rem; top: 15%; left: 10%; animation-duration: 9s; animation-delay: 0s; }
        .fs-2 { font-size: 3rem; top: 60%; left: 15%; animation-duration: 11s; animation-delay: 1.5s; }
        .fs-3 { font-size: 2.5rem; top: 25%; right: 12%; animation-duration: 8s; animation-delay: 0.5s; }
        .fs-4 { font-size: 3.5rem; top: 70%; right: 18%; animation-duration: 12s; animation-delay: 2s; }
        .fs-5 { font-size: 2rem; top: 40%; left: 45%; animation-duration: 10s; animation-delay: 3s; }
        .fs-6 { font-size: 3rem; top: 80%; left: 50%; animation-duration: 13s; animation-delay: 1s; }
        .fs-7 { font-size: 2.2rem; top: 50%; right: 40%; animation-duration: 9.5s; animation-delay: 4.5s; }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.05;
            }
            50% {
                transform: translateY(-30px) rotate(15deg);
                opacity: 0.2;
            }
            100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.05;
            }
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }
            .hero-subtitle {
                font-size: 1rem;
            }
            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }
            .hero-buttons .btn {
                width: 100%;
                justify-content: center;
            }
            .floating-symbol {
                opacity: 0.06;
            }
            .fs-5, .fs-6, .fs-7 {
                display: none;
            }
        }
    </style>
</body>
</html>
