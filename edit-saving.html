<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Saving - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-brand">Lakshya ₹100K</a>
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="navbar-nav" id="navbarNav">
            <div class="dropdown" id="menuDropdown">
                <div class="nav-link dropdown-toggle" id="menuToggle">Menu</div>
                <div class="dropdown-menu">
                    <a href="dashboard.html" class="dropdown-item">Dashboard</a>
                    <a href="history.html" class="dropdown-item">History</a>
                    <a href="analytics.html" class="dropdown-item">Analytics</a>
                    <a href="gallery.html" class="dropdown-item">Gallery</a>
                    <a href="achievements.html" class="dropdown-item">Achievements</a>
                    <a href="profile.html" class="dropdown-item">Profile</a>
                    <a href="settings.html" class="dropdown-item">Settings</a>
                </div>
            </div>
            <a href="#" class="nav-link logout" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                <a href="history.html" class="btn btn-secondary btn-sm">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <h2 style="margin: 0;">
                    Edit Saving
                </h2>
            </div>
            
            <div id="loadingMessage" style="text-align: center; padding: 2rem;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                <p style="margin-top: 1rem; color: var(--text-secondary);">Loading saving details...</p>
            </div>
            
            <form id="editSavingForm" style="display: none;">
                <input type="hidden" name="savingId" id="savingId">
                <input type="hidden" name="existingImagePath" id="existingImagePath">
                
                <div class="form-group">
                    <label class="form-label">Amount *</label>
                    <input type="number" class="form-input" name="amount" id="amount" required placeholder="Enter amount" min="1" max="100000000">
                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">
                        Maximum: ₹1,00,00,000
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-input" name="date" id="dateInput" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Time</label>
                        <input type="time" class="form-input" name="time" id="timeInput" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-input" name="category" id="category" required>
                        <option value="Cash">Cash</option>
                        <option value="UPI">UPI</option>
                        <option value="Bank">Bank</option>
                        <option value="Wallet">Wallet</option>
                        <option value="Investment">Investment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Note (Optional)</label>
                    <textarea class="form-input form-textarea" name="note" id="note" placeholder="Add a note about this saving..." maxlength="500"></textarea>
                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">
                        Maximum 500 characters
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Image Proof (Optional)</label>
                    <div id="existingImageContainer" style="margin-bottom: 1rem; display: none;">
                        <div style="position: relative; display: inline-block;">
                            <img id="existingImage" style="max-width: 200px; max-height: 200px; border-radius: var(--radius-md); object-fit: cover;">
                            <button type="button" onclick="removeExistingImage()" style="position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-times" style="font-size: 0.75rem;"></i>
                            </button>
                        </div>
                        <div style="margin-top: 0.5rem; font-size: 0.875rem; color: var(--text-secondary);">
                            Current image
                        </div>
                    </div>
                    
                    <div class="file-upload" onclick="document.getElementById('imageInput').click()">
                        <input type="file" id="imageInput" name="image" accept="image/jpeg,image/jpg,image/png,image/webp" onchange="previewImage(this)">
                        <div class="file-upload-icon">
                            <i class="fas fa-cloud-upload-alt"></i>
                        </div>
                        <div class="file-upload-text">Click to upload new proof image (JPG, PNG, WebP - Max 5MB)</div>
                    </div>
                    <div id="imagePreview" style="margin-top: 1rem; display: none; position: relative;">
                        <img id="previewImg" style="max-width: 200px; max-height: 200px; border-radius: var(--radius-md); object-fit: cover;">
                        <button type="button" onclick="removeNewImage()" style="position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-times" style="font-size: 0.75rem;"></i>
                        </button>
                    </div>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" onclick="cancelEdit()" class="btn btn-secondary" style="flex: 1;">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center; padding: 1rem;">
                        Update Saving
                    </button>
                </div>
            </form>
        </div>
    </main>

    <style>
        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
        }
    </style>

    <script type="module">
        import { onAuthStateChange, logoutUser, getCurrentUser, initializeAuthGuard } from './js/auth.js';
        import { getSavingById, updateSaving } from './js/database.js';
        import { uploadSavingImage, deleteSavingImage } from './js/storage.js';

        initializeAuthGuard();

        // Get saving ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const savingId = urlParams.get('id');

        // Check authentication
        onAuthStateChange((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else if (savingId) {
                loadSaving(savingId);
            } else {
                window.location.href = 'history.html';
            }
        });

        // Load saving details
        async function loadSaving(id) {
            const result = await getSavingById(id);
            if (result.success && result.data) {
                const saving = result.data;
                
                document.getElementById('savingId').value = saving.id;
                document.getElementById('amount').value = saving.amount;
                document.getElementById('dateInput').value = saving.date;
                document.getElementById('timeInput').value = saving.time || '00:00';
                document.getElementById('category').value = saving.category;
                document.getElementById('note').value = saving.note || '';
                document.getElementById('existingImagePath').value = saving.imagePath || '';
                
                if (saving.imageURL) {
                    document.getElementById('existingImage').src = saving.imageURL;
                    document.getElementById('existingImageContainer').style.display = 'block';
                }
                
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('editSavingForm').style.display = 'block';
            } else {
                alert('Saving not found');
                window.location.href = 'history.html';
            }
        }

        // Preview new image
        window.previewImage = function(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // Validate file size (5MB)
                if (file.size > 5 * 1024 * 1024) {
                    alert('Image size must be less than 5 MB');
                    input.value = '';
                    return;
                }
                
                // Validate file type
                const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp'];
                if (!allowedTypes.includes(file.type)) {
                    alert('Only JPG, PNG, and WebP images are allowed');
                    input.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        };

        // Remove existing image
        window.removeExistingImage = function() {
            document.getElementById('existingImagePath').value = '';
            document.getElementById('existingImage').src = '';
            document.getElementById('existingImageContainer').style.display = 'none';
        };

        // Remove new image
        window.removeNewImage = function() {
            document.getElementById('imageInput').value = '';
            document.getElementById('previewImg').src = '';
            document.getElementById('imagePreview').style.display = 'none';
        };

        // Cancel edit
        window.cancelEdit = function() {
            window.location.href = 'history.html';
        };

        // Handle form submission
        document.getElementById('editSavingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = getCurrentUser();
            if (!user) {
                alert('Please login first');
                return;
            }
            
            const savingId = e.target.savingId.value;
            const amount = parseInt(e.target.amount.value);
            const date = e.target.date.value;
            const time = e.target.time.value;
            const category = e.target.category.value;
            const note = e.target.note.value.trim();
            const imageFile = e.target.image.files[0];
            const existingImagePath = e.target.existingImagePath.value;
            
            // Validate amount
            if (isNaN(amount) || amount <= 0) {
                alert('Please enter a valid amount greater than zero');
                return;
            }
            
            if (amount > 100000000) {
                alert('Amount cannot exceed ₹1,00,00,000');
                return;
            }
            
            // Prevent duplicate submission
            const submitBtn = e.target.querySelector('button[type="submit"]');
            if (submitBtn.disabled) return;
            
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            
            let imageURL = null;
            let imagePath = existingImagePath;
            
            // Handle image changes
            if (imageFile) {
                // Delete old image if exists
                if (existingImagePath) {
                    await deleteSavingImage(existingImagePath);
                }
                
                // Upload new image
                const uploadResult = await uploadSavingImage(imageFile, user.uid, savingId);
                if (uploadResult.success) {
                    imageURL = uploadResult.url;
                    imagePath = `proofs/${user.uid}/${savingId}_${Date.now()}.jpg`;
                } else {
                    alert(uploadResult.error);
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
            } else if (!existingImagePath) {
                // No image selected and no existing image
                imageURL = null;
                imagePath = null;
            }
            
            // Update saving in Firestore
            const savingData = {
                amount,
                date,
                time,
                category,
                note,
                imageURL,
                imagePath
            };
            
            const result = await updateSaving(savingId, savingData);
            
            if (result.success) {
                alert('Saving updated successfully!');
                window.location.href = 'history.html';
            } else {
                alert(result.error);
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Dropdown menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        
        if (menuToggle && menuDropdown) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDropdown.classList.toggle('open');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!menuDropdown.contains(e.target)) {
                    menuDropdown.classList.remove('open');
                }
            });
        }

        // Mobile menu
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('navbarNav').classList.toggle('open');
        });
    </script>
</body>
</html>
