<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </div>

    <div class="auth-container" id="authContainer" style="display: none;">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Login</h1>
                <p>Welcome back to your savings journey</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" name="email" required placeholder="you@example.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div style="position: relative;">
                        <input type="password" class="form-input" name="password" id="password" required placeholder="••••••••">
                        <button type="button" onclick="togglePassword('password')" class="password-toggle">
                            <i class="fas fa-eye" id="password-icon"></i>
                        </button>
                    </div>
                    <div style="text-align: right; margin-top: 0.5rem;">
                        <a href="#" id="forgotPassword" style="font-size: 0.875rem; color: var(--text-secondary); text-decoration: none;">Forgot password?</a>
                    </div>
                </div>
                
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.875rem; color: var(--text-secondary);">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; box-shadow: var(--shadow-md), var(--glow-primary);">
                    Sign in
                </button>
                
                <div style="position: relative; margin: 1.5rem 0;">
                    <hr style="border: none; border-top: 1px solid var(--border-color);">
                    <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-primary); padding: 0 1rem; color: var(--text-secondary); font-size: 0.875rem;">or</span>
                </div>
                
                <button type="button" class="btn btn-secondary" style="width: 100%; position: relative; opacity: 0.6; cursor: not-allowed;" disabled>
                    <i class="fab fa-google" style="margin-right: 0.5rem;"></i>
                    Continue with Google
                    <span style="position: absolute; top: -8px; right: -8px; background: var(--primary); color: white; font-size: 0.625rem; padding: 2px 6px; border-radius: 4px; font-weight: 500;">Coming Soon</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <span style="color: var(--text-secondary);">Don't have an account? </span>
                <a href="signup.html" style="color: var(--text-primary); font-weight: 500;">Sign up</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { loginUser, onAuthStateChange } from './js/auth.js';
        import { showToast } from './js/utils.js';
        
        const loadingScreen = document.getElementById('loadingScreen');
        const authContainer = document.getElementById('authContainer');

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            loadingScreen.style.display = 'none';
            
            if (user) {
                // User is authenticated, redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // User is not authenticated, show login form
                authContainer.style.display = 'flex';
            }
        });

        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = document.getElementById(fieldId + '-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        window.togglePassword = togglePassword;

        // Forgot password handler
        document.getElementById('forgotPassword').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const { resetPassword } = await import('./js/auth.js');
            const email = prompt('Enter your email address to receive a password reset link:');
            if (!email) return;
            
            const result = await resetPassword(email);
            if (result.success) {
                showToast('Password reset email sent! Check your inbox.', 'success');
            } else {
                showToast(result.error, 'error');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identifier = e.target.email.value.trim();
            const password = e.target.password.value;
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            const result = await loginUser(identifier, password);
            
            if (result.success) {
                showToast('Login successful! Redirecting...', 'success');
                // Wait for Firebase to confirm auth state before redirect
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                showToast(result.error, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg), var(--glow-primary);
            animation: float 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(0, 0, 0, 0.03),
                transparent
            );
            transform: rotate(45deg);
            animation: shine 4s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            animation: fadeInDown 0.6s ease;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0;
            animation: fadeInDown 0.6s ease 0.1s backwards;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-tertiary);
            padding: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: var(--text-secondary);
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
            }
        }
    </style>
</body>
</html>
