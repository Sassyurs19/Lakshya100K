<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Premium Animated Background -->
    <div class="premium-background">
        <div class="gradient-blob gradient-blob-1"></div>
        <div class="gradient-blob gradient-blob-2"></div>
        <div class="gradient-blob gradient-blob-3"></div>
        <div class="grid-pattern"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="mouse-glow" id="mouseGlow"></div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </div>

    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    
    <div class="page-container" id="navbar" style="display: none;">
        <!-- Left Sidebar - Profile -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="navbar-brand">
                    <span class="brand-name">Lakshya</span>
                    <span class="brand-amount">₹100K</span>
                </a>
            </div>
            
            <div class="profile-section">
                <div class="avatar-large" id="userAvatar">U</div>
                <div class="username-display" id="usernameDisplay">@username</div>
                <a href="profile.html" class="btn btn-outline btn-sm">View Profile</a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="add-saving.html" class="nav-link">
                    <i class="fas fa-plus-circle"></i> Add Saving
                </a>
                <a href="history.html" class="nav-link active">
                    <i class="fas fa-history"></i> History
                </a>
                <a href="analytics.html" class="nav-link">
                    <i class="fas fa-chart-line"></i> Analytics
                </a>
                <a href="gallery.html" class="nav-link">
                    <i class="fas fa-images"></i> Gallery
                </a>
                <a href="achievements.html" class="nav-link">
                    <i class="fas fa-trophy"></i> Achievements
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="#" class="icon-btn" title="Notifications">
                    <i class="fas fa-bell"></i>
                </a>
                <a href="#" class="icon-btn logout" id="logoutBtn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </aside>

        <!-- Mobile Menu Toggle -->
        <div class="mobile-menu-toggle" id="mobileMenuToggle" title="Toggle Menu">
            <i class="fas fa-bars"></i>
        </div>
        
        <!-- Main Content -->
        <main class="main-content" id="main-content" style="display: none;">
        <h2 style="margin-bottom: 2rem;">Savings History</h2>
        
        <div class="card search-filter-bar">
            <input type="text" class="form-input search-input" id="searchInput" placeholder="Search by amount, category, or note...">
            <select class="form-input filter-select" id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="Cash">Cash</option>
                <option value="Bank">Bank</option>
                <option value="UPI">UPI</option>
                <option value="Wallet">Wallet</option>
                <option value="Investment">Investment</option>
                <option value="Other">Other</option>
            </select>
            <select class="form-input filter-select" id="timeFilter">
                <option value="all">All Time</option>
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
            </select>
            <select class="form-input filter-select" id="sortFilter">
                <option value="date-desc">Newest First</option>
                <option value="date-asc">Oldest First</option>
                <option value="amount-desc">Highest Amount</option>
                <option value="amount-asc">Lowest Amount</option>
            </select>
            <button class="btn btn-secondary" id="exportBtn" onclick="exportToCSV()">
                <i class="fas fa-download"></i> Export
            </button>
        </div>
        
        <div class="savings-cards-grid" id="savingsGrid">
            <div class="empty-state" style="grid-column: 1 / -1;">
                <h3 class="empty-state-title">No savings yet</h3>
                <p class="empty-state-text">Start your savings journey today by adding your first saving!</p>
                <a href="add-saving.html" class="btn btn-primary">Add First Saving</a>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 2rem;">
            <button id="loadMoreBtn" class="btn btn-secondary" onclick="loadMoreSavings()" style="display: none;">
                Load More
            </button>
        </div>
    </main>

    <div id="imageModal" class="modal">
        <button class="modal-close" onclick="closeModal()">
            <i class="fas fa-times"></i>
        </button>
        <img id="modalImage" class="modal-content" src="">
    </div>

    <style>
        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-filter-bar {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .search-input {
            flex: 1;
        }

        .filter-select {
            width: auto;
            min-width: 150px;
        }

        .savings-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing-lg);
        }

        .saving-card {
            padding: var(--spacing-lg);
        }

        .saving-thumbnail {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: var(--radius-md);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
            .search-filter-bar {
                flex-direction: column;
            }
            .filter-select {
                width: 100%;
            }
        }
    </style>

    <script type="module">
        import { onAuthStateChange, logoutUser, getCurrentUser } from './js/auth.js';
        import { getUserSavingsPaginated, deleteSaving, getUserDocument } from './js/database.js';
        import { showToast, debounce } from './js/utils.js';

        const loadingScreen = document.getElementById('loadingScreen');
        const navbar = document.getElementById('navbar');
        const mainContent = document.getElementById('main-content');

        let currentPage = 1;
        let lastDoc = null;
        let hasMore = true;
        const savingsPerPage = 20;
        let allSavings = []; // Store all savings for filtering

        // Timeout fallback - if auth doesn't resolve in 5 seconds, show error
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout - Firebase may not be initialized');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: var(--danger); margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Unable to connect. Please check your internet connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (!user) {
                window.location.href = 'login.html';
            } else {
                navbar.style.display = 'block';
                mainContent.style.display = 'block';
                loadUserInfo(user);
                loadSavings(user);
            }
        });

        async function loadUserInfo(user) {
            const userDoc = await getUserDocument(user.uid);
            if (userDoc.success) {
                const userData = userDoc.data;
                const username = userData.username || 'user';
                const usernameDisplay = document.getElementById('usernameDisplay');
                const userAvatar = document.getElementById('userAvatar');
                
                if (usernameDisplay) usernameDisplay.textContent = `@${username}`;
                if (userAvatar) {
                    const userInitial = (userData.fullName || userData.username || 'U').charAt(0).toUpperCase();
                    userAvatar.textContent = userInitial;
                }
            }
        }

        async function loadSavings(user, reset = false) {
            if (reset) {
                currentPage = 1;
                lastDoc = null;
                hasMore = true;
                allSavings = [];
                document.getElementById('savingsGrid').innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 2rem;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                    </div>
                `;
            }

            const result = await getUserSavingsPaginated(user.uid, savingsPerPage, lastDoc);
            
            if (result.success && result.data.length > 0) {
                const savings = result.data;
                lastDoc = result.lastDoc;
                hasMore = result.hasMore;
                
                // Store all savings for filtering
                allSavings = [...allSavings, ...savings];
                
                const savingsHTML = savings.map((saving) => {
                    return `
                        <div class="card saving-card" data-category="${saving.category}" data-date="${saving.date}" data-amount="${saving.amount}" data-note="${saving.note || ''}" data-id="${saving.id}">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                                <div>
                                    <div style="font-size: 1.75rem; font-weight: 600;">
                                        ₹${saving.amount.toLocaleString()}
                                    </div>
                                    <div style="color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.25rem;">
                                        ${new Date(saving.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
                                        ${saving.time ? ` at ${saving.time}` : ''}
                                    </div>
                                </div>
                                <div style="background: var(--bg-tertiary); padding: 0.25rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.875rem;">
                                    ${saving.category}
                                </div>
                            </div>
                            
                            ${saving.note ? `
                            <div style="color: var(--text-secondary); margin-bottom: 1rem; line-height: 1.5; font-size: 0.875rem;">
                                ${saving.note.length > 100 ? saving.note.substring(0, 100) + '...' : saving.note}
                            </div>
                            ` : ''}
                            
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                ${saving.imageURL ? `
                                <img src="${saving.imageURL}" class="saving-thumbnail" loading="lazy" onclick="openModal('${saving.imageURL}')">
                                ` : '<div style="flex: 1;"></div>'}
                                
                                <div style="display: flex; gap: 0.5rem;">
                                    <button onclick="viewSaving('${saving.id}')" class="btn btn-secondary btn-sm" title="View Details">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button onclick="editSaving('${saving.id}')" class="btn btn-secondary btn-sm" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteSavingHandler('${saving.id}')" class="btn btn-danger btn-sm" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.8rem;">
                                Running Total: <strong>₹${(saving.runningTotal || 0).toLocaleString()}</strong>
                            </div>
                        </div>
                    `;
                }).join('');
                
                if (reset) {
                    document.getElementById('savingsGrid').innerHTML = savingsHTML;
                } else {
                    document.getElementById('savingsGrid').innerHTML += savingsHTML;
                }
                
                // Show/hide load more button
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                if (loadMoreBtn) {
                    loadMoreBtn.style.display = hasMore ? 'block' : 'none';
                }
            } else if (reset) {
                // Show empty state
                document.getElementById('savingsGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">
                            <i class="fas fa-piggy-bank"></i>
                        </div>
                        <h3 class="empty-state-title">No savings recorded yet</h3>
                        <p class="empty-state-text">Start your savings journey today by adding your first saving!</p>
                        <a href="add-saving.html" class="btn btn-primary">Add Your First Saving</a>
                    </div>
                `;
                
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                if (loadMoreBtn) {
                    loadMoreBtn.style.display = 'none';
                }
            }
        }

        window.deleteSavingHandler = async function(savingId) {
            if (confirm('Are you sure you want to delete this saving? This action cannot be undone.')) {
                const result = await deleteSaving(savingId);
                if (result.success) {
                    showToast('Saving deleted successfully', 'success');
                    location.reload();
                } else {
                    showToast(result.error, 'error');
                }
            }
        };

        window.loadMoreSavings = function() {
            const user = getCurrentUser();
            if (user) {
                currentPage++;
                loadSavings(user, false);
            }
        };

        // Instant search with debounce
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const timeFilter = document.getElementById('timeFilter');
        const sortFilter = document.getElementById('sortFilter');

        const filterSavings = debounce(() => {
            const searchTerm = searchInput.value.toLowerCase();
            const category = categoryFilter.value;
            const time = timeFilter.value;
            const sort = sortFilter.value;
            
            let filtered = allSavings.filter(saving => {
                const matchesSearch = 
                    saving.amount.toString().includes(searchTerm) ||
                    saving.category.toLowerCase().includes(searchTerm) ||
                    (saving.note && saving.note.toLowerCase().includes(searchTerm));
                
                const matchesCategory = category === 'all' || saving.category === category;
                
                let matchesTime = true;
                if (time !== 'all') {
                    const savingDate = new Date(saving.date);
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    
                    if (time === 'today') {
                        matchesTime = savingDate >= today;
                    } else if (time === 'week') {
                        const weekAgo = new Date(today);
                        weekAgo.setDate(weekAgo.getDate() - 7);
                        matchesTime = savingDate >= weekAgo;
                    } else if (time === 'month') {
                        const monthAgo = new Date(today);
                        monthAgo.setMonth(monthAgo.getMonth() - 1);
                        matchesTime = savingDate >= monthAgo;
                    }
                }
                
                return matchesSearch && matchesCategory && matchesTime;
            });
            
            // Sort
            if (sort === 'date-desc') {
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (sort === 'date-asc') {
                filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            } else if (sort === 'amount-desc') {
                filtered.sort((a, b) => b.amount - a.amount);
            } else if (sort === 'amount-asc') {
                filtered.sort((a, b) => a.amount - b.amount);
            }
            
            // Render filtered results
            renderSavings(filtered);
        }, 300);

        searchInput.addEventListener('input', filterSavings);
        categoryFilter.addEventListener('change', filterSavings);
        timeFilter.addEventListener('change', filterSavings);
        sortFilter.addEventListener('change', filterSavings);

        function renderSavings(savings) {
            const grid = document.getElementById('savingsGrid');
            
            if (savings.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">
                            <i class="fas fa-search"></i>
                        </div>
                        <h3 class="empty-state-title">No savings found</h3>
                        <p class="empty-state-text">Try adjusting your filters or search terms</p>
                    </div>
                `;
                return;
            }
            
            const savingsHTML = savings.map((saving) => {
                return `
                        <div class="card saving-card" data-category="${saving.category}" data-date="${saving.date}" data-amount="${saving.amount}" data-note="${saving.note || ''}" data-id="${saving.id}">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                                <div>
                                    <div style="font-size: 1.75rem; font-weight: 600;">
                                        ₹${saving.amount.toLocaleString()}
                                    </div>
                                    <div style="color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.25rem;">
                                        ${new Date(saving.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
                                        ${saving.time ? ` at ${saving.time}` : ''}
                                    </div>
                                </div>
                                <div style="background: var(--bg-tertiary); padding: 0.25rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.875rem;">
                                    ${saving.category}
                                </div>
                            </div>
                            ${saving.note ? `<div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1rem;">${saving.note}</div>` : ''}
                            ${saving.imageURL ? `<img src="${saving.imageURL}" style="width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 1rem; cursor: pointer;" onclick="openModal('${saving.imageURL}')">` : ''}
                            <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                                <button onclick="editSaving('${saving.id}')" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                                <button onclick="deleteSavingHandler('${saving.id}')" class="btn btn-danger" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    `;
            }).join('');
            
            grid.innerHTML = savingsHTML;
        }

        // Export to CSV function
        window.exportToCSV = function() {
            if (allSavings.length === 0) {
                showToast('No savings to export', 'error');
                return;
            }
            
            const headers = ['Date', 'Time', 'Amount', 'Category', 'Note'];
            const csvContent = [
                headers.join(','),
                ...allSavings.map(saving => [
                    saving.date,
                    saving.time || '',
                    saving.amount,
                    saving.category,
                    `"${saving.note || ''}"`
                ].join(','))
            ].join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `savings_export_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('Export successful!', 'success');
        };

        window.viewSaving = async function(savingId) {
            // Get saving details from allSavings array
            const saving = allSavings.find(s => s.id === savingId);
            if (!saving) return;
            
            const amount = `₹${saving.amount.toLocaleString()}`;
            const date = `${new Date(saving.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}${saving.time ? ` at ${saving.time}` : ''}`;
            const category = saving.category;
            const note = saving.note || '';
            const runningTotal = `₹${(saving.runningTotal || 0).toLocaleString()}`;
            const imageURL = saving.imageURL || null;
            
            const modalHTML = `
                <div class="modal active" id="savingModal" style="display: flex;">
                    <div class="modal-content" style="max-width: 600px; padding: 2rem;">
                        <button onclick="closeSavingModal()" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary);">
                            <i class="fas fa-times"></i>
                        </button>
                        
                        <h2 style="margin-bottom: 1.5rem;">Saving Details</h2>
                        
                        ${imageURL ? `
                        <div style="margin-bottom: 1.5rem;">
                            <img src="${imageURL}" style="width: 100%; max-height: 400px; object-fit: contain; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                        </div>
                        ` : ''}
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                            <div>
                                <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Amount</div>
                                <div style="font-size: 1.5rem; font-weight: 600;">${amount}</div>
                            </div>
                            <div>
                                <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Category</div>
                                <div style="font-size: 1.5rem; font-weight: 600;">${category}</div>
                            </div>
                        </div>
                        
                        <div style="margin-bottom: 1rem;">
                            <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Date & Time</div>
                            <div style="font-size: 1.125rem;">${date}</div>
                        </div>
                        
                        ${note ? `
                        <div style="margin-bottom: 1rem;">
                            <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Note</div>
                            <div style="font-size: 1rem; line-height: 1.6;">${note}</div>
                        </div>
                        ` : ''}
                        
                        <div style="margin-bottom: 1.5rem; padding: 1rem; background: var(--bg-tertiary); border-radius: var(--radius-md);">
                            <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">Running Total</div>
                            <div style="font-size: 1.5rem; font-weight: 600; color: var(--primary);">${runningTotal}</div>
                        </div>
                        
                        <div style="display: flex; gap: 1rem;">
                            <button onclick="editSaving('${savingId}'); closeSavingModal();" class="btn btn-secondary" style="flex: 1;">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button onclick="deleteSavingHandler('${savingId}')" class="btn btn-danger" style="flex: 1;">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            // Remove existing modal if any
            const existingModal = document.getElementById('savingModal');
            if (existingModal) existingModal.remove();
            
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        };

        window.closeSavingModal = function() {
            const modal = document.getElementById('savingModal');
            if (modal) modal.remove();
        };

        window.editSaving = function(savingId) {
            window.location.href = `edit-saving.html?id=${savingId}`;
        };

        window.openModal = function(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('active');
        };

        window.closeModal = function() {
            document.getElementById('imageModal').classList.remove('active');
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Mouse glow effect
        const mouseGlow = document.getElementById('mouseGlow');
        if (mouseGlow) {
            document.addEventListener('mousemove', (e) => {
                mouseGlow.style.left = e.clientX + 'px';
                mouseGlow.style.top = e.clientY + 'px';
                mouseGlow.classList.add('active');
            });

            document.addEventListener('mouseleave', () => {
                mouseGlow.classList.remove('active');
            });
        }

        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        
        // Load saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        }
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Update icon
            if (newTheme === 'dark') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        });

        // Mobile menu toggle
        const mobileMenuToggle = document.getElementById('mobileMenuToggle');
        const sidebar = document.querySelector('.sidebar');
        
        if (mobileMenuToggle && sidebar) {
            mobileMenuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                sidebar.classList.toggle('open');
            });
            
            // Close sidebar when clicking outside
            document.addEventListener('click', (e) => {
                if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== mobileMenuToggle) {
                    sidebar.classList.remove('open');
                }
            });
        }
    </script>

    </style>
