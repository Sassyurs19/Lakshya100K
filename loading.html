<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        .loading-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-primary);
        }

        .loading-content {
            text-align: center;
            max-width: 500px;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
            box-shadow: var(--glow-primary);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            animation: fadeInUp 0.6s ease;
        }

        .loading-message {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease 0.1s backwards;
        }

        .loading-tips {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-top: 2rem;
            animation: fadeInUp 0.6s ease 0.2s backwards;
        }

        .loading-tips-icon {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .loading-tips-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .loading-progress {
            width: 100%;
            max-width: 300px;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            margin: 2rem auto 0;
            animation: fadeInUp 0.6s ease 0.3s backwards;
        }

        .loading-progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            animation: progress 2s ease-in-out forwards;
            box-shadow: var(--glow-primary);
        }

        @keyframes progress {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .floating-element {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 1s;
        }

        .floating-element:nth-child(3) {
            bottom: 30%;
            left: 20%;
            animation-delay: 2s;
        }

        .floating-element:nth-child(4) {
            bottom: 15%;
            right: 10%;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element">₹</div>
        <div class="floating-element">💰</div>
        <div class="floating-element">📈</div>
        <div class="floating-element">🎯</div>
    </div>

    <div class="loading-container">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            
            <h1 class="loading-title">Loading Your Savings Journey</h1>
            <p class="loading-message" id="loadingMessage">Preparing your dashboard...</p>
            
            <div class="loading-progress">
                <div class="loading-progress-bar"></div>
            </div>

            <div class="loading-tips">
                <div class="loading-tips-icon">
                    <i class="fas fa-lightbulb"></i>
                </div>
                <p class="loading-tips-text" id="loadingTip">
                    Small savings add up to big dreams. Start with ₹100 today!
                </p>
            </div>
        </div>
    </div>

    <script>
        const messages = [
            'Loading your savings data...',
            'Calculating your progress...',
            'Preparing your dashboard...',
            'Almost there...'
        ];

        const tips = [
            'Small savings add up to big dreams. Start with ₹100 today!',
            'Consistency is key. Save a little every day!',
            'Track your progress to stay motivated!',
            'Your ₹100K goal is closer than you think!',
            'Every rupee saved is a step towards financial freedom!'
        ];

        let messageIndex = 0;
        let tipIndex = 0;

        setInterval(() => {
            messageIndex = (messageIndex + 1) % messages.length;
            document.getElementById('loadingMessage').textContent = messages[messageIndex];
        }, 2000);

        setInterval(() => {
            tipIndex = (tipIndex + 1) % tips.length;
            document.getElementById('loadingTip').textContent = tips[tipIndex];
        }, 3000);

        // Redirect to dashboard after loading
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 3000);
    </script>
</body>
</html>
