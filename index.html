<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshya ₹100K - Small Savings. Big Dreams.</title>
    <meta name="description" content="Track every rupee, build lasting habits, and reach your ₹1,00,000 goal with confidence.">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="hero-section">
        <div class="hero-content fade-in">
            <h1 class="hero-title">Save Today.<br>Achieve Tomorrow.</h1>
            <p class="hero-subtitle">Track every rupee, build lasting habits, and reach your ₹1,00,000 goal with confidence.</p>
            <div class="hero-buttons">
                <a href="signup.html" class="btn btn-primary btn-lg">
                    Create Account
                </a>
                <a href="login.html" class="btn btn-outline btn-lg">
                    Login
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeAuthGuard } from './js/auth.js';
        initializeAuthGuard();
    </script>

    <style>
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .hero-subtitle {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }
            .hero-subtitle {
                font-size: 1rem;
            }
            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }
            .hero-buttons .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</body>
</html>
