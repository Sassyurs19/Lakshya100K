<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Premium Animated Background -->
    <div class="premium-background">
        <div class="gradient-blob gradient-blob-1"></div>
        <div class="gradient-blob gradient-blob-2"></div>
        <div class="gradient-blob gradient-blob-3"></div>
        <div class="grid-pattern"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="mouse-glow" id="mouseGlow"></div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </div>

    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    
    <div class="page-container" id="navbar" style="display: none;">
        <!-- Left Sidebar - Profile -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="navbar-brand">
                    <span class="brand-name">Lakshya</span>
                    <span class="brand-amount">₹100K</span>
                </a>
            </div>
            
            <div class="profile-section">
                <div class="avatar-large" id="userAvatar">U</div>
                <div class="username-display" id="usernameDisplay">@username</div>
                <a href="profile.html" class="btn btn-outline btn-sm">View Profile</a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="add-saving.html" class="nav-link">
                    <i class="fas fa-plus-circle"></i> Add Saving
                </a>
                <a href="history.html" class="nav-link">
                    <i class="fas fa-history"></i> History
                </a>
                <a href="analytics.html" class="nav-link">
                    <i class="fas fa-chart-line"></i> Analytics
                </a>
                <a href="gallery.html" class="nav-link active">
                    <i class="fas fa-images"></i> Gallery
                </a>
                <a href="achievements.html" class="nav-link">
                    <i class="fas fa-trophy"></i> Achievements
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="#" class="icon-btn" title="Notifications">
                    <i class="fas fa-bell"></i>
                </a>
                <a href="#" class="icon-btn logout" id="logoutBtn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content" id="main-content" style="display: none;">
        <h1 style="margin-bottom: 2rem; font-family: 'Playfair Display', serif;">Proof Gallery</h1>
        
        <div class="gallery-masonry" id="galleryGrid">
            <div class="empty-state" style="grid-column: 1 / -1;">
                <div class="empty-state-icon">
                    <i class="fas fa-images"></i>
                </div>
                <h3 class="empty-state-title">No images yet</h3>
                <p class="empty-state-text">Add savings with proof images to see them here</p>
                <a href="add-saving.html" class="btn btn-primary">Add Saving with Image</a>
            </div>
        </div>
    </main>

    <div id="imageModal" class="modal">
        <button class="modal-close" onclick="closeModal()">
            <i class="fas fa-times"></i>
        </button>
        <button class="modal-nav modal-prev" onclick="navigateModal(-1)">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="modal-nav modal-next" onclick="navigateModal(1)">
            <i class="fas fa-chevron-right"></i>
        </button>
        <div class="modal-image-container">
            <img id="modalImage" class="modal-content" src="" onclick="toggleZoom()">
        </div>
        <div class="modal-actions">
            <button onclick="zoomIn()" class="btn btn-secondary btn-sm">
                <i class="fas fa-search-plus"></i>
            </button>
            <button onclick="zoomOut()" class="btn btn-secondary btn-sm">
                <i class="fas fa-search-minus"></i>
            </button>
            <button onclick="downloadImage()" class="btn btn-primary btn-sm">
                <i class="fas fa-download"></i> Download
            </button>
            <button onclick="deleteImage()" class="btn btn-danger btn-sm">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
    </div>

    <style>
        .main-content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-masonry {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            grid-auto-rows: 200px;
            grid-auto-flow: dense;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .gallery-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-lg), var(--glow-primary);
        }

        .gallery-item.tall {
            grid-row: span 2;
        }

        .gallery-item.wide {
            grid-column: span 2;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            padding: 1.5rem;
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease;
            transform: translateY(20px);
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-amount {
            font-size: 1.25rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 0.25rem;
        }

        .gallery-date {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .gallery-category {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: var(--radius-lg);
            transition: transform 0.3s ease;
            cursor: zoom-in;
            box-shadow: var(--shadow-xl);
        }

        .modal-image-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .modal-nav:hover {
            background: var(--primary);
            transform: translateY(-50%) scale(1.1);
        }

        .modal-prev {
            left: 1rem;
        }

        .modal-next {
            right: 1rem;
        }

        .modal-actions {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .modal-actions .btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .modal-actions .btn:hover {
            background: var(--primary);
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }

            .gallery-masonry {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

            .gallery-item.wide {
                grid-column: span 1;
            }

            .modal-nav {
                width: 40px;
                height: 40px;
            }

            .modal-actions {
                flex-wrap: wrap;
                justify-content: center;
                width: 90%;
            }
        }
    </style>

    <script type="module">
        import { onAuthStateChange, logoutUser } from './js/auth.js';
        import { getUserSavings, getUserDocument } from './js/database.js';

        const loadingScreen = document.getElementById('loadingScreen');
        const navbar = document.getElementById('navbar');
        const mainContent = document.getElementById('main-content');

        let currentImageURL = '';
        let allImages = [];
        let currentIndex = 0;
        let zoomLevel = 1;

        // Timeout fallback - if auth doesn't resolve in 5 seconds, show error
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout - Firebase may not be initialized');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: var(--danger); margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Unable to connect. Please check your internet connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (!user) {
                window.location.href = 'login.html';
            } else {
                navbar.style.display = 'block';
                mainContent.style.display = 'block';
                loadUserInfo(user);
                loadGallery(user);
            }
        });

        async function loadUserInfo(user) {
            const userDoc = await getUserDocument(user.uid);
            if (userDoc.success) {
                const userData = userDoc.data;
                const username = userData.username || 'user';
                const usernameDisplay = document.getElementById('usernameDisplay');
                const userAvatar = document.getElementById('userAvatar');
                
                if (usernameDisplay) usernameDisplay.textContent = `@${username}`;
                if (userAvatar) {
                    const userInitial = (userData.fullName || userData.username || 'U').charAt(0).toUpperCase();
                    userAvatar.textContent = userInitial;
                }
            }
        }

        async function loadGallery(user) {
            const result = await getUserSavings(user.uid);
            if (result.success) {
                const savingsWithImages = result.data.filter(s => s.imageURL);
                allImages = savingsWithImages;
                
                if (savingsWithImages.length > 0) {
                    const galleryHTML = savingsWithImages.map((saving, index) => {
                        // Add random tall/wide classes for masonry variation
                        const isTall = index % 5 === 0;
                        const isWide = index % 7 === 0;
                        const sizeClass = isTall ? 'tall' : (isWide ? 'wide' : '');
                        
                        return `
                            <div class="card gallery-item ${sizeClass}" onclick="openModal('${saving.imageURL}', ${index})">
                                <span class="gallery-category">${saving.category}</span>
                                <img src="${saving.imageURL}" alt="Saving proof" loading="lazy">
                                <div class="gallery-overlay">
                                    <div class="gallery-amount">₹${saving.amount.toLocaleString()}</div>
                                    <div class="gallery-date">${new Date(saving.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    document.getElementById('galleryGrid').innerHTML = galleryHTML;
                }
            }
        }

        window.openModal = function(src, index) {
            currentImageURL = src;
            currentIndex = index;
            zoomLevel = 1;
            document.getElementById('modalImage').src = src;
            document.getElementById('modalImage').style.transform = 'scale(1)';
            document.getElementById('modalImage').classList.remove('zoomed');
            document.getElementById('imageModal').classList.add('active');
        };

        window.closeModal = function() {
            document.getElementById('imageModal').classList.remove('active');
            zoomLevel = 1;
        };

        window.navigateModal = function(direction) {
            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < allImages.length) {
                currentIndex = newIndex;
                currentImageURL = allImages[currentIndex].imageURL;
                zoomLevel = 1;
                document.getElementById('modalImage').src = currentImageURL;
                document.getElementById('modalImage').style.transform = 'scale(1)';
                document.getElementById('modalImage').classList.remove('zoomed');
            }
        };

        window.toggleZoom = function() {
            const img = document.getElementById('modalImage');
            if (zoomLevel === 1) {
                zoomLevel = 2;
                img.style.transform = 'scale(2)';
                img.classList.add('zoomed');
            } else {
                zoomLevel = 1;
                img.style.transform = 'scale(1)';
                img.classList.remove('zoomed');
            }
        };

        window.zoomIn = function() {
            if (zoomLevel < 3) {
                zoomLevel += 0.5;
                document.getElementById('modalImage').style.transform = `scale(${zoomLevel})`;
                document.getElementById('modalImage').classList.add('zoomed');
            }
        };

        window.zoomOut = function() {
            if (zoomLevel > 1) {
                zoomLevel -= 0.5;
                document.getElementById('modalImage').style.transform = `scale(${zoomLevel})`;
                if (zoomLevel === 1) {
                    document.getElementById('modalImage').classList.remove('zoomed');
                }
            }
        };

        window.downloadImage = function() {
            const a = document.createElement('a');
            a.href = currentImageURL;
            a.download = 'saving-proof.jpg';
            a.target = '_blank';
            a.click();
        };

        window.deleteImage = async function() {
            if (confirm('Are you sure you want to delete this saving? This action cannot be undone.')) {
                const saving = allImages[currentIndex];
                if (saving && saving.id) {
                    const { deleteSaving } = await import('./js/database.js');
                    const result = await deleteSaving(saving.id);
                    if (result.success) {
                        closeModal();
                        const user = onAuthStateChange._currentUser;
                        if (user) loadGallery(user);
                    }
                }
            }
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            } else if (e.key === 'ArrowLeft') {
                navigateModal(-1);
            } else if (e.key === 'ArrowRight') {
                navigateModal(1);
            }
        });

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Mouse glow effect
        const mouseGlow = document.getElementById('mouseGlow');
        if (mouseGlow) {
            document.addEventListener('mousemove', (e) => {
                mouseGlow.style.left = e.clientX + 'px';
                mouseGlow.style.top = e.clientY + 'px';
                mouseGlow.classList.add('active');
            });

            document.addEventListener('mouseleave', () => {
                mouseGlow.classList.remove('active');
            });
        }

        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        
        // Load saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        }
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Update icon
            if (newTheme === 'dark') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        });
    </script>

    <style>
        .page-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            margin-bottom: 2rem;
        }

        .profile-section {
            text-align: center;
            padding: 1.5rem 0;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            margin: 0 auto 1rem;
            box-shadow: var(--shadow-lg), var(--glow-primary);
        }

        .profile-section .username-display {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-nav .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition-normal);
            font-weight: 500;
        }

        .sidebar-nav .nav-link:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .sidebar-nav .nav-link.active {
            background: var(--gradient-primary);
            color: white;
        }

        .sidebar-nav .nav-link i {
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .sidebar-footer .icon-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-normal);
            text-decoration: none;
        }

        .sidebar-footer .icon-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .sidebar-footer .icon-btn.logout:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 240px;
            }

            .main-content {
                margin-left: 240px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform var(--transition-slow);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 1rem;
            }

            .mobile-menu-toggle {
                display: flex;
                position: fixed;
                bottom: 1rem;
                right: 1rem;
                width: 56px;
                height: 56px;
                background: var(--gradient-primary);
                border-radius: 50%;
                align-items: center;
                justify-content: center;
                color: white;
                box-shadow: var(--shadow-lg), var(--glow-primary);
                z-index: 1000;
                cursor: pointer;
            }
        }
    </style>
</body>
</html>
