<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Lakshya ₹100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </div>

    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <nav class="navbar" id="navbar" style="display: none;">
        <a href="dashboard.html" class="navbar-brand">
            <span class="brand-name">Lakshya</span>
            <span class="brand-amount">₹100K</span>
        </a>
        <div class="navbar-center">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="add-saving.html" class="nav-link">Add Saving</a>
            <a href="history.html" class="nav-link">History</a>
            <a href="analytics.html" class="nav-link">Analytics</a>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <a href="achievements.html" class="nav-link">Achievements</a>
            <a href="settings.html" class="nav-link active">Settings</a>
        </div>
        <div class="navbar-right">
            <div class="dropdown" id="menuDropdown">
                <div class="dropdown-toggle" id="menuToggle">
                    <div class="avatar" id="userAvatar">U</div>
                    <span class="username-display" id="usernameDisplay">@username</span>
                </div>
                <div class="dropdown-menu">
                    <a href="profile.html" class="dropdown-item">
                        <i class="fas fa-user"></i>
                        Profile
                    </a>
                    <a href="settings.html" class="dropdown-item">
                        <i class="fas fa-cog"></i>
                        Settings
                    </a>
                    <div style="border-top: 1px solid var(--border-color); margin: var(--spacing-sm) 0;"></div>
                    <a href="#" class="dropdown-item logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </a>
                </div>
            </div>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content" style="display: none;">
        <h2 style="margin-bottom: 2rem;">Settings</h2>
        
        <form id="settingsForm">
            <div class="grid grid-2" style="margin-bottom: 2rem;">
                <!-- Goal Settings -->
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">
                        Goal Settings
                    </h3>
                    <div class="form-group">
                        <label class="form-label">Goal Amount</label>
                        <input type="number" class="form-input" name="goal" id="goalInput" placeholder="Enter your goal amount" min="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Currency Symbol</label>
                        <select class="form-input" name="currency" id="currencyInput">
                            <option value="₹">₹ (Rupee)</option>
                            <option value="$">$ (Dollar)</option>
                            <option value="€">€ (Euro)</option>
                            <option value="£">£ (Pound)</option>
                        </select>
                    </div>
                </div>
                
                <!-- Reminder Settings -->
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">
                        Reminder Settings
                    </h3>
                    <div class="form-group">
                        <label class="form-label">Daily Reminder Time</label>
                        <input type="time" class="form-input" name="reminderTime" id="reminderTimeInput">
                    </div>
                    <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.5rem;">
                        Enable browser notifications to receive reminders.
                    </div>
                </div>
            </div>
            
            <!-- Theme Settings -->
            <div class="card" style="margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1.5rem;">
                    Theme
                </h3>
                <div class="form-group">
                    <label class="form-label">Theme Preference</label>
                    <select class="form-input" name="theme" id="themeInput">
                        <option value="light">Light</option>
                        <option value="dark">Dark (Coming Soon)</option>
                        <option value="auto">Auto (Coming Soon)</option>
                    </select>
                </div>
            </div>
            
            <!-- Data Management -->
            <div class="card" style="margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1.5rem;">
                    Data Management
                </h3>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <button type="button" onclick="exportData()" class="btn btn-secondary">
                        <i class="fas fa-download"></i> Export Data
                    </button>
                    <button type="button" onclick="backupData()" class="btn btn-secondary">
                        <i class="fas fa-cloud-upload-alt"></i> Backup
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Settings
            </button>
        </form>
    </main>

    <style>
        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
            
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script type="module">
        import { onAuthStateChange, logoutUser, getCurrentUser } from './js/auth.js';
        import { getUserDocument, updateUserDocument, getUserSavings } from './js/database.js';
        import { exportToCSV, showToast } from './js/utils.js';

        const loadingScreen = document.getElementById('loadingScreen');
        const navbar = document.getElementById('navbar');
        const mainContent = document.getElementById('main-content');

        // Timeout fallback - if auth doesn't resolve in 5 seconds, show error
        const authTimeout = setTimeout(() => {
            console.error('Auth state timeout - Firebase may not be initialized');
            loadingScreen.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: var(--danger); margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Unable to connect. Please check your internet connection.</p>
                    <button onclick="window.location.reload()" class="btn btn-primary">Retry</button>
                </div>
            `;
        }, 5000);

        // Wait for Firebase auth state to resolve
        onAuthStateChange((user) => {
            clearTimeout(authTimeout);
            loadingScreen.style.display = 'none';
            
            if (!user) {
                window.location.href = 'login.html';
            } else {
                navbar.style.display = 'block';
                mainContent.style.display = 'block';
                loadUserInfo(user);
                loadSettings(user);
            }
        });

        async function loadUserInfo(user) {
            const userDoc = await getUserDocument(user.uid);
            if (userDoc.success) {
                const userData = userDoc.data;
                const username = userData.username || 'user';
                const usernameDisplay = document.getElementById('usernameDisplay');
                const userAvatar = document.getElementById('userAvatar');
                
                if (usernameDisplay) usernameDisplay.textContent = `@${username}`;
                if (userAvatar) {
                    const userInitial = (userData.fullName || userData.username || 'U').charAt(0).toUpperCase();
                    userAvatar.textContent = userInitial;
                }
            }
        }

        // Load settings
        async function loadSettings(user) {
            const userDoc = await getUserDocument(user.uid);
            if (userDoc.success) {
                const userData = userDoc.data;
                document.getElementById('goalInput').value = userData.goal || 100000;
                document.getElementById('currencyInput').value = userData.currency || '₹';
                document.getElementById('reminderTimeInput').value = userData.settings?.reminderTime || '21:00';
                document.getElementById('themeInput').value = userData.settings?.theme || 'light';
            }
        }

        // Save settings
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = getCurrentUser();
            
            const settings = {
                goal: parseInt(e.target.goal.value),
                currency: e.target.currency.value,
                settings: {
                    reminderTime: e.target.reminderTime.value,
                    theme: e.target.theme.value
                }
            };
            
            const result = await updateUserDocument(user.uid, settings);
            if (result.success) {
                showToast('Settings saved successfully!', 'success');
            } else {
                showToast(result.error, 'error');
            }
        });

        // Export data
        window.exportData = async function() {
            const user = getCurrentUser();
            const savings = await getUserSavings(user.uid);
            
            if (savings.success && savings.data.length > 0) {
                const exportData = savings.data.map(s => ({
                    Date: s.date,
                    Time: s.time,
                    Amount: s.amount,
                    Category: s.category,
                    Note: s.note
                }));
                exportToCSV(exportData, 'savings-export.csv');
                showToast('Data exported successfully!', 'success');
            } else {
                showToast('No data to export', 'warning');
            }
        };

        // Backup data (placeholder)
        window.backupData = function() {
            showToast('Backup feature coming soon', 'info');
        };

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
        });

        // Dropdown menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        
        if (menuToggle && menuDropdown) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDropdown.classList.toggle('open');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!menuDropdown.contains(e.target)) {
                    menuDropdown.classList.remove('open');
                }
            });
        }

        // Hamburger menu toggle for mobile
        const hamburger = document.getElementById('hamburger');
        const navbarCenter = document.querySelector('.navbar-center');
        
        if (hamburger && navbarCenter) {
            hamburger.addEventListener('click', () => {
                navbarCenter.classList.toggle('open');
            });

            // Close menu when clicking a link
            navbarCenter.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    navbarCenter.classList.remove('open');
                });
            });

            // Close menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!navbarCenter.contains(e.target) && !hamburger.contains(e.target)) {
                    navbarCenter.classList.remove('open');
                }
            });
        }
    </script>
</body>
</html>
